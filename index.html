<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0d0d14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AI Chat">
<meta name="mobile-web-app-capable" content="yes">
<title>AI Chat — Pollinations</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --bg: #0d0d14;
  --bg2: #13131e;
  --bg3: #1a1a28;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.13);
  --accent: #7c5cfc;
  --accent2: #a78bfa;
  --text: rgba(255,255,255,0.88);
  --text2: rgba(255,255,255,0.55);
  --muted: rgba(255,255,255,0.30);
  --bubble-ai-bg: rgba(255,255,255,0.04);
  --bubble-ai-bdr: rgba(255,255,255,0.08);
  --bubble-usr-bg: rgba(124,92,252,0.18);
  --bubble-usr-bdr: rgba(124,92,252,0.35);
  --bubble-usr-txt: #e4ddff;
  --input-bg: rgba(255,255,255,0.05);
  --input-bdr: rgba(255,255,255,0.12);
  --topbar-bg: rgba(13,13,20,0.85);
  --code-bg: #161622;
  --code-hdr: rgba(255,255,255,0.05);
  --inline-code-bg: rgba(124,92,252,0.18);
  --inline-code-bdr: rgba(124,92,252,0.28);
  --inline-code-col: #a78bfa;
  --img-frame-bg: rgba(255,255,255,0.04);
  --sidebar: 280px;
}

body.light {
  --bg: #f4f4f8;
  --bg2: #ffffff;
  --bg3: #eaeaf0;
  --border: rgba(0,0,0,0.08);
  --border2: rgba(0,0,0,0.14);
  --accent: #6c47f5;
  --accent2: #5535d4;
  --text: #1a1a2e;
  --text2: #5a5a7a;
  --muted: #9898b8;
  --bubble-ai-bg: #ffffff;
  --bubble-ai-bdr: rgba(0,0,0,0.08);
  --bubble-usr-bg: rgba(108,71,245,0.10);
  --bubble-usr-bdr: rgba(108,71,245,0.25);
  --bubble-usr-txt: #2d1a7a;
  --input-bg: #ffffff;
  --input-bdr: rgba(0,0,0,0.14);
  --topbar-bg: rgba(244,244,248,0.92);
  --code-bg: #1e1e2e;
  --code-hdr: rgba(0,0,0,0.5);
  --inline-code-bg: rgba(108,71,245,0.10);
  --inline-code-bdr: rgba(108,71,245,0.22);
  --inline-code-col: #5535d4;
  --img-frame-bg: rgba(0,0,0,0.04);
}

html, body { height:100%; overflow:hidden; background:var(--bg); color:var(--text); font-family:'Syne',sans-serif; }

.app { display:flex; height:100vh; position:relative; }

/* SIDEBAR */
.sidebar { 
  width:var(--sidebar); 
  background:var(--bg2); 
  border-right:1px solid var(--border); 
  display:flex; 
  flex-direction:column; 
  flex-shrink:0; 
  overflow:hidden; 
  transition:transform .3s;
  z-index: 100;
  position: relative;
}

@media (max-width: 700px) {
  .sidebar {
    position: fixed;
    left: 0;
    top: 0;
    bottom: 0;
    transform: translateX(-100%);
    box-shadow: 2px 0 20px rgba(0,0,0,0.3);
    z-index: 1000;
  }
  .sidebar.open {
    transform: translateX(0);
  }
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(3px);
    z-index: 999;
    opacity: 0;
    visibility: hidden;
    transition: opacity .2s;
  }
  .overlay.open {
    opacity: 1;
    visibility: visible;
  }
}

.sidebar-header { padding:16px 14px 12px; border-bottom:1px solid var(--border); }
.logo { font-size:16px; font-weight:700; display:flex; align-items:center; gap:8px; margin-bottom:12px; }
.logo-dot { width:9px; height:9px; border-radius:50%; background:var(--accent); animation:pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

.new-chat-btn { width:100%; padding:9px 12px; background:rgba(124,92,252,0.12); border:1px solid rgba(124,92,252,0.28); border-radius:10px; color:var(--accent2); font-family:'Syne',sans-serif; font-size:13px; font-weight:600; cursor:pointer; display:flex; align-items:center; gap:7px; }

.search-wrap { padding:8px 14px 4px; }
.search-wrap-inner { position:relative; }
.search-icon { position:absolute; left:9px; top:50%; transform:translateY(-50%); font-size:13px; color:var(--muted); }
.search-input { width:100%; background:var(--input-bg); border:1px solid var(--border2); border-radius:8px; color:var(--text); font-family:'Syne',sans-serif; font-size:12px; padding:7px 10px 7px 30px; outline:none; }

.chats-label { padding:10px 14px 4px; font-size:10px; font-family:'JetBrains Mono',monospace; color:var(--muted); text-transform:uppercase; }
.chats-list { flex:1; overflow-y:auto; padding:4px 8px; }
.chat-item { padding:8px 10px; border-radius:8px; cursor:pointer; display:flex; align-items:center; gap:8px; }
.chat-item.active { background:rgba(124,92,252,0.14); }
.chat-item-text { flex:1; font-size:12.5px; color:var(--text2); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.chat-actions { display:flex; gap:2px; opacity:0; }
.chat-item:hover .chat-actions { opacity:1; }
@media (max-width: 700px) { .chat-actions { opacity:1; } }
.chat-rename, .chat-delete { background:none; border:none; cursor:pointer; font-size:13px; padding:6px 8px; min-width:32px; }
.rename-input { flex:1; background:rgba(255,255,255,.08); border:1px solid rgba(124,92,252,.5); border-radius:5px; color:var(--text); padding:4px 6px; }

.sidebar-footer { padding:10px 14px; border-top:1px solid var(--border); font-size:11px; display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
.theme-btn { background:none; border:1px solid var(--border2); color:var(--muted); width:32px; height:32px; border-radius:7px; cursor:pointer; margin-left:auto; }
.free-badge { background:rgba(34,197,94,.12); border:1px solid rgba(34,197,94,.25); color:#4ade80; font-size:10px; padding:2px 7px; border-radius:20px; }

/* MAIN */
.main { flex:1; display:flex; flex-direction:column; overflow:hidden; }
.topbar { padding:13px 16px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:12px; background:var(--topbar-bg); backdrop-filter:blur(12px); flex-shrink:0; }
.menu-btn { display: none; background:var(--bg3); border:1px solid var(--border2); border-radius:8px; width:36px; height:36px; cursor:pointer; font-size:18px; }
@media (max-width: 700px) { .menu-btn { display: flex; align-items:center; justify-content:center; } }
.topbar-title { font-size:14px; font-weight:600; color:var(--text2); flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

/* КНОПКА УСТАНОВКИ */
.install-btn {
  background: linear-gradient(135deg, var(--accent), #a855f7);
  border: none;
  color: white;
  font-family: 'Syne', sans-serif;
  font-size: 12px;
  font-weight: 600;
  padding: 6px 14px;
  border-radius: 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
  transition: transform 0.1s;
}
.install-btn:active { transform: scale(0.96); }
.install-btn.hidden { display: none; }

.mode-toggle { display:flex; background:var(--bg3); border:1px solid var(--border2); border-radius:9px; padding:3px; gap:2px; }
.mode-btn { padding:5px 12px; border-radius:6px; border:none; background:transparent; color:var(--muted); font-size:12px; cursor:pointer; }
.mode-btn.active { background:var(--accent); color:#fff; }
@media (max-width: 480px) { .mode-btn { padding:5px 8px; font-size:11px; } }

.messages-wrap { flex:1; overflow-y:auto; padding:16px 0; -webkit-overflow-scrolling: touch; }
.messages-inner { max-width:780px; margin:0 auto; padding:0 16px; display:flex; flex-direction:column; gap:16px; }

.empty-state { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:58vh; gap:10px; text-align:center; color:var(--muted); }
.empty-glyph { font-size:44px; background:linear-gradient(135deg,var(--accent),#c084fc); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.suggestions { display:flex; flex-wrap:wrap; gap:7px; justify-content:center; margin-top:6px; }
.suggest-btn { padding:8px 14px; background:var(--bg2); border:1px solid var(--border2); border-radius:20px; font-size:12px; cursor:pointer; }

.msg { display:flex; gap:10px; animation:fadeUp .25s ease; }
.msg.user { flex-direction:row-reverse; }
@keyframes fadeUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

.avatar { width:32px; height:32px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:700; flex-shrink:0; }
.avatar.ai { background:rgba(124,92,252,.18); color:var(--accent2); border:1px solid rgba(124,92,252,.28); }
.avatar.usr { background:var(--bg3); color:var(--text2); border:1px solid var(--border2); }

.bubble { max-width:78%; padding:10px 14px; border-radius:14px; font-size:14px; line-height:1.6; word-break:break-word; }
.msg.ai .bubble { background:var(--bubble-ai-bg); border:1px solid var(--bubble-ai-bdr); border-radius:4px 14px 14px 14px; }
.msg.user .bubble { background:var(--bubble-usr-bg); border:1px solid var(--bubble-usr-bdr); color:var(--bubble-usr-txt); border-radius:14px 4px 14px 14px; }
@media (max-width: 600px) { .avatar { width:28px; height:28px; } .bubble { max-width:85%; padding:8px 12px; font-size:13px; } }

.img-msg { background:var(--img-frame-bg); border:1px solid var(--border2); border-radius:14px; overflow:hidden; max-width:100%; width:min(400px, 85vw); }
.img-msg img { width:100%; cursor:pointer; }
.img-download { display:inline-block; margin:0 10px 10px; padding:5px 12px; background:rgba(124,92,252,.15); border:1px solid rgba(124,92,252,.3); border-radius:7px; color:var(--accent2); font-size:11px; text-decoration:none; cursor:pointer; }

.code-block { margin:8px 0; border-radius:10px; overflow:hidden; border:1px solid rgba(255,255,255,.1); background:var(--code-bg); }
.code-header { display:flex; align-items:center; gap:8px; padding:6px 12px; background:var(--code-hdr); flex-wrap:wrap; }
.code-lang { font-family:'JetBrains Mono',monospace; font-size:10px; color:rgba(255,255,255,.4); flex:1; }
.code-copy, .code-download { background:none; border:1px solid rgba(255,255,255,.12); color:rgba(255,255,255,.4); font-size:10px; padding:3px 8px; border-radius:5px; cursor:pointer; }
.code-block pre { margin:0!important; padding:12px!important; overflow-x:auto; font-size:12px!important; }

.typing-wrap { display:flex; gap:10px; }
.typing-bubble { background:var(--bubble-ai-bg); border:1px solid var(--bubble-ai-bdr); padding:12px 16px; border-radius:4px 14px 14px 14px; display:flex; gap:5px; }
.dot { width:6px; height:6px; border-radius:50%; background:var(--accent); animation:bounce 1.2s infinite; }
.dot:nth-child(2){animation-delay:.2s} .dot:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}

.input-area { padding:12px 16px 16px; background:linear-gradient(to top, var(--bg) 80%, transparent); }
.input-inner { max-width:780px; margin:0 auto; display:flex; gap:9px; align-items:flex-end; }
.input-wrap { flex:1; background:var(--input-bg); border:1px solid var(--input-bdr); border-radius:20px; }
.input-wrap:focus-within { border-color:rgba(124,92,252,.5); }
#user-input { width:100%; background:transparent; border:none; outline:none; color:var(--text); font-family:'Syne',sans-serif; font-size:14px; padding:11px 15px; resize:none; max-height:120px; }
#send-btn { width:44px; height:44px; border-radius:22px; background:var(--accent); border:none; cursor:pointer; font-size:16px; color:#fff; }
#send-btn:disabled { opacity:0.4; cursor:not-allowed; }
.input-hint { text-align:center; font-size:10px; color:var(--muted); margin-top:6px; }

.img-gen-opts { display:flex; gap:8px; flex-wrap:wrap; margin-top:8px; }
.img-gen-select { font-size:11px; background:var(--input-bg); border:1px solid var(--border2); color:var(--text); padding:6px 8px; border-radius:8px; }

.hl { background:rgba(251,191,36,.35); border-radius:2px; }
.overlay { transition: opacity 0.2s; }
</style>
</head>
<body>

<div class="app">
  <div class="overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo"><div class="logo-dot"></div>AI Chat</div>
      <button class="new-chat-btn" onclick="newChat(); closeSidebar();">＋ Новый чат</button>
    </div>
    <div class="search-wrap">
      <div class="search-wrap-inner">
        <span class="search-icon">🔍</span>
        <input class="search-input" id="search-input" placeholder="Поиск по чатам..." oninput="renderSidebar()">
      </div>
    </div>
    <div class="chats-label">Разговоры</div>
    <div class="chats-list" id="chats-list"></div>
    <div class="sidebar-footer">
      <span>pollinations.ai</span>
      <span class="free-badge">FREE</span>
      <button class="theme-btn" id="theme-btn" onclick="toggleTheme()">🌙</button>
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <button class="menu-btn" onclick="toggleSidebar()">☰</button>
      <span class="topbar-title" id="topbar-title">Новый чат</span>
      <button class="install-btn hidden" id="installBtn">📲 Установить</button>
      <div class="mode-toggle">
        <button class="mode-btn active" onclick="setMode('chat')">💬 Чат</button>
        <button class="mode-btn" onclick="setMode('image')">🖼 Картинки</button>
      </div>
    </div>

    <div class="messages-wrap" id="messages-wrap">
      <div class="messages-inner" id="messages"></div>
    </div>

    <div class="input-area">
      <div class="input-inner">
        <div class="input-wrap">
          <textarea id="user-input" rows="1" placeholder="Напиши сообщение..."></textarea>
        </div>
        <button id="send-btn" onclick="handleSend()">➤</button>
      </div>
      <div class="img-gen-opts" id="img-opts" style="display:none;">
        <select class="img-gen-select" id="img-size">
          <option value="1024x1024">1024×1024</option>
          <option value="1280x720">1280×720</option>
          <option value="720x1280">720×1280</option>
          <option value="512x512">512×512</option>
        </select>
        <select class="img-gen-select" id="img-style">
          <option value="">Стиль: любой</option>
          <option value="photorealistic">Фото</option>
          <option value="anime">Аниме</option>
          <option value="oil painting">Масло</option>
        </select>
      </div>
      <div class="input-hint" id="input-hint">Enter — отправить · Shift+Enter — перенос</div>
    </div>
  </main>
</div>

<script>
// ========== PWA УСТАНОВКА НА ГЛАВНЫЙ ЭКРАН ==========
let deferredPrompt = null;
const installBtn = document.getElementById('installBtn');

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  installBtn.classList.remove('hidden');
  console.log('✅ Можно установить приложение');
});

function installApp() {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then((result) => {
      if (result.outcome === 'accepted') {
        console.log('✅ Приложение установлено!');
      }
      deferredPrompt = null;
      installBtn.classList.add('hidden');
    });
  } else {
    // На iOS показываем подсказку
    if (/iPhone|iPad|iPod/.test(navigator.userAgent)) {
      alert('Нажмите "Поделиться" → "На экран Домой"');
    } else {
      alert('Нажмите ⋮ или меню браузера → "Установить приложение"');
    }
  }
}

installBtn.onclick = installApp;

// ========== ВСЁ ОСТАЛЬНОЕ ==========
let chats = JSON.parse(localStorage.getItem('ai_chats') || '[]');
let current = null;
let loading = false;
let mode = 'chat';

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebar-overlay').classList.toggle('open');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('open');
}

const savedTheme = localStorage.getItem('ai_theme') || 'dark';
if (savedTheme === 'light') { document.body.classList.add('light'); document.getElementById('theme-btn').textContent = '☀️'; }
function toggleTheme() {
  const isLight = document.body.classList.toggle('light');
  document.getElementById('theme-btn').textContent = isLight ? '☀️' : '🌙';
  localStorage.setItem('ai_theme', isLight ? 'light' : 'dark');
}

function setMode(m) {
  mode = m;
  document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
  document.getElementById(mode === 'chat' ? 'mode-chat' : 'mode-image').classList.add('active');
  document.getElementById('img-opts').style.display = m === 'image' ? 'flex' : 'none';
  document.getElementById('user-input').placeholder = m === 'image' ? 'Опиши картинку на английском...' : 'Напиши сообщение...';
  document.getElementById('input-hint').textContent = m === 'image' ? 'Описание лучше на английском' : 'Enter — отправить · Shift+Enter — перенос';
}

if (chats.length === 0) newChat();
else { loadChat(chats[0].id); renderSidebar(); }

function newChat() {
  const id = 'chat_' + Date.now();
  chats.unshift({ id, title: 'Новый чат', messages: [] });
  save(); loadChat(id); renderSidebar(); closeSidebar();
}

function loadChat(id) {
  current = id;
  const chat = chats.find(c => c.id === id);
  if (!chat) return;
  document.getElementById('topbar-title').textContent = chat.title;
  renderMessages(); renderSidebar(); closeSidebar();
}

function save() { localStorage.setItem('ai_chats', JSON.stringify(chats)); }

function deleteChat(id, e) {
  e.stopPropagation();
  chats = chats.filter(c => c.id !== id);
  save();
  if (current === id) { chats.length === 0 ? newChat() : loadChat(chats[0].id); }
  else renderSidebar();
}

function startRename(id, e) {
  e.stopPropagation();
  const item = e.target.closest('.chat-item');
  const textEl = item.querySelector('.chat-item-text');
  const chat = chats.find(c => c.id === id);
  if (!chat) return;
  const input = document.createElement('input');
  input.type = 'text'; input.value = chat.title; input.className = 'rename-input';
  textEl.replaceWith(input);
  input.focus(); input.select();
  function commit() {
    const val = input.value.trim();
    if (val && val !== chat.title) {
      chat.title = val;
      if (id === current) document.getElementById('topbar-title').textContent = chat.title;
      save();
    }
    renderSidebar();
  }
  input.addEventListener('blur', commit);
  input.addEventListener('keydown', e2 => { if (e2.key === 'Enter') input.blur(); });
}

function renderSidebar() {
  const query = (document.getElementById('search-input').value || '').toLowerCase();
  const list = document.getElementById('chats-list');
  list.innerHTML = '';
  const filtered = query ? chats.filter(c => c.title.toLowerCase().includes(query)) : chats;
  filtered.forEach(chat => {
    const el = document.createElement('div');
    el.className = 'chat-item' + (chat.id === current ? ' active' : '');
    el.onclick = () => loadChat(chat.id);
    let titleHtml = escapeHtml(chat.title);
    if (query) titleHtml = titleHtml.replace(new RegExp(`(${escapeRegex(query)})`, 'gi'), '<span class="hl">$1</span>');
    el.innerHTML = `<span class="chat-item-icon">💬</span><span class="chat-item-text">${titleHtml}</span>
      <div class="chat-actions"><button class="chat-rename">✏</button><button class="chat-delete">✕</button></div>`;
    el.querySelector('.chat-rename').onclick = e => startRename(chat.id, e);
    el.querySelector('.chat-delete').onclick = e => deleteChat(chat.id, e);
    list.appendChild(el);
  });
}

function escapeRegex(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }
function escapeHtml(t) { return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function renderMessages() {
  const chat = chats.find(c => c.id === current);
  const el = document.getElementById('messages');
  if (!chat || !chat.messages.length) {
    el.innerHTML = `<div class="empty-state"><div class="empty-glyph">✦</div><div class="empty-title">Начни разговор</div>
      <div class="empty-sub">pollinations.ai · без ключа · без лимитов</div>
      <div class="suggestions"><button class="suggest-btn" onclick="quickSend('Напиши Hello World на Python')">🐍 Python</button>
      <button class="suggest-btn" onclick="quickSend('Объясни нейросети простыми словами')">🧠 Нейросети</button>
      <button class="suggest-btn" onclick="quickSend('Придумай 5 идей для стартапа')">💡 Идеи</button></div></div>`;
    return;
  }
  el.innerHTML = '';
  chat.messages.forEach(m => appendMsgEl(m.role, m.content, m.type, false));
  scrollBottom();
}

function appendMsgEl(role, content, type, animate) {
  const el = document.getElementById('messages');
  const wrap = document.createElement('div');
  wrap.className = 'msg ' + (role === 'user' ? 'user' : 'ai');
  if (!animate) wrap.style.animation = 'none';
  
  const av = document.createElement('div');
  av.className = 'avatar ' + (role === 'user' ? 'usr' : 'ai');
  av.textContent = role === 'user' ? 'Вы' : 'AI';
  
  if (type === 'image') {
    const frame = document.createElement('div');
    frame.className = 'img-msg';
    frame.innerHTML = `<img src="${content}" alt="image" onclick="window.open('${content}','_blank')">
      <div style="padding:6px 10px; font-size:11px; color:var(--muted)">🖼 Сгенерировано Pollinations</div>
      <a class="img-download" href="${content}" download="image.jpg" target="_blank">↓ Скачать</a>`;
    wrap.appendChild(av); wrap.appendChild(frame);
  } else {
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = role === 'ai' ? formatMessage(content) : escapeHtml(content).replace(/\n/g,'<br>');
    wrap.appendChild(av); wrap.appendChild(bubble);
    setTimeout(() => { wrap.querySelectorAll('pre code').forEach(b => hljs.highlightElement(b)); }, 10);
  }
  el.appendChild(wrap);
  scrollBottom();
}

function formatMessage(text) {
  const blocks = [];
  text = text.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) => {
    const label = lang || 'code';
    const html = `<div class="code-block"><div class="code-header"><span class="code-lang">${label}</span>
      <button class="code-copy">⎘ копировать</button><button class="code-download">↓ скачать</button></div>
      <pre><code class="language-${label}">${escapeHtml(code.trim())}</code></pre></div>`;
    blocks.push(html);
    return '\x00B' + (blocks.length-1) + '\x00';
  });
  text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  text = text.replace(/\n/g, '<br>');
  text = text.replace(/\x00B(\d+)\x00/g, (_, i) => blocks[+i]);
  return text;
}

function showTyping() {
  const el = document.getElementById('messages');
  const w = document.createElement('div');
  w.className = 'typing-wrap'; w.id = 'typing';
  w.innerHTML = '<div class="avatar ai">AI</div><div class="typing-bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
  el.appendChild(w); scrollBottom();
}
function removeTyping() { const t = document.getElementById('typing'); if(t) t.remove(); }
function scrollBottom() { const w = document.getElementById('messages-wrap'); setTimeout(()=>w.scrollTop=w.scrollHeight,30); }

function handleSend() { if (mode === 'image') generateImage(); else sendMessage(); }

async function sendMessage() {
  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if (!text || loading) return;
  const chat = chats.find(c => c.id === current);
  if (!chat) return;
  
  loading = true;
  document.getElementById('send-btn').disabled = true;
  input.value = '';
  
  chat.messages.push({ role:'user', content:text });
  if (chat.messages.length === 1) {
    chat.title = text.slice(0,40) + (text.length>40?'…':'');
    document.getElementById('topbar-title').textContent = chat.title;
  }
  save(); appendMsgEl('user', text, null, true); showTyping(); renderSidebar();
  
  try {
    const msgs = [{ role:'system', content:'You are a helpful assistant. Write COMPLETE code, never truncate.' }, 
      ...chat.messages.map(m => ({ role: m.role==='ai'?'assistant':m.role, content:m.content }))];
    const resp = await fetch('https://text.pollinations.ai/openai', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ model:'openai', messages:msgs, max_tokens:4096 })
    });
    const data = await resp.json();
    const reply = data.choices?.[0]?.message?.content || 'Ошибка';
    removeTyping();
    chat.messages.push({ role:'ai', content:reply });
    save(); appendMsgEl('ai', reply, null, true);
  } catch(e) {
    removeTyping();
    chat.messages.push({ role:'ai', content:'⚠ Ошибка: ' + e.message });
    save(); appendMsgEl('ai', e.message, null, true);
  }
  loading = false;
  document.getElementById('send-btn').disabled = false;
  input.focus();
}

async function generateImage() {
  const input = document.getElementById('user-input');
  const prompt = input.value.trim();
  if (!prompt || loading) return;
  const chat = chats.find(c => c.id === current);
  if (!chat) return;
  
  const size = document.getElementById('img-size').value;
  const style = document.getElementById('img-style').value;
  const [w, h] = size.split('x');
  const fullPrompt = style ? prompt + ', ' + style : prompt;
  const url = `https://image.pollinations.ai/prompt/${encodeURIComponent(fullPrompt)}?width=${w}&height=${h}&nologo=true`;
  
  loading = true;
  document.getElementById('send-btn').disabled = true;
  input.value = '';
  
  chat.messages.push({ role:'user', content:prompt });
  if (chat.messages.length === 1) {
    chat.title = '🖼 ' + prompt.slice(0,35);
    document.getElementById('topbar-title').textContent = chat.title;
  }
  save(); appendMsgEl('user', prompt, null, true); showTyping(); renderSidebar();
  
  await new Promise(r => setTimeout(r, 1000));
  removeTyping();
  chat.messages.push({ role:'ai', content:url, type:'image' });
  save(); appendMsgEl('ai', url, 'image', true);
  
  loading = false;
  document.getElementById('send-btn').disabled = false;
  input.focus();
}

function quickSend(text) {
  document.getElementById('user-input').value = text;
  sendMessage();
}

const inputEl = document.getElementById('user-input');
inputEl.addEventListener('keydown', e => { if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); } });
inputEl.addEventListener('input', () => { inputEl.style.height='auto'; inputEl.style.height=Math.min(inputEl.scrollHeight,120)+'px'; });
</script>
</body>
</html>
