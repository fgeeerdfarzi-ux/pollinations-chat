<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AI Chat — Pollinations</title>
<link rel="manifest" id="pwa-manifest">
<meta name="theme-color" content="#0d0d14">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AI Chat">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:#0d0d14; --bg2:#13131e; --bg3:#1a1a28;
  --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.13);
  --accent:#7c5cfc; --accent2:#a78bfa;
  --text:rgba(255,255,255,0.88); --text2:rgba(255,255,255,0.55); --muted:rgba(255,255,255,0.30);
  --bubble-ai-bg:rgba(255,255,255,0.04); --bubble-ai-bdr:rgba(255,255,255,0.08);
  --bubble-usr-bg:rgba(124,92,252,0.18); --bubble-usr-bdr:rgba(124,92,252,0.35); --bubble-usr-txt:#e4ddff;
  --input-bg:rgba(255,255,255,0.05); --input-bdr:rgba(255,255,255,0.12);
  --topbar-bg:rgba(13,13,20,0.9); --code-bg:#161622; --code-hdr:rgba(255,255,255,0.05);
  --inline-code-bg:rgba(124,92,252,0.18); --inline-code-bdr:rgba(124,92,252,0.28); --inline-code-col:#a78bfa;
  --img-frame-bg:rgba(255,255,255,0.04); --sidebar:280px;
}
body.light {
  --bg:#f4f4f8; --bg2:#ffffff; --bg3:#eaeaf0;
  --border:rgba(0,0,0,0.08); --border2:rgba(0,0,0,0.14);
  --accent:#6c47f5; --accent2:#5535d4;
  --text:#1a1a2e; --text2:#5a5a7a; --muted:#9898b8;
  --bubble-ai-bg:#ffffff; --bubble-ai-bdr:rgba(0,0,0,0.08);
  --bubble-usr-bg:rgba(108,71,245,0.10); --bubble-usr-bdr:rgba(108,71,245,0.25); --bubble-usr-txt:#2d1a7a;
  --input-bg:#ffffff; --input-bdr:rgba(0,0,0,0.14);
  --topbar-bg:rgba(244,244,248,0.95); --code-bg:#1e1e2e; --code-hdr:rgba(0,0,0,0.5);
  --inline-code-bg:rgba(108,71,245,0.10); --inline-code-bdr:rgba(108,71,245,0.22); --inline-code-col:#5535d4;
  --img-frame-bg:rgba(0,0,0,0.04);
}

html, body { height:100%; overflow:hidden; background:var(--bg); color:var(--text); font-family:'Syne',sans-serif; transition:background .25s,color .25s; }

/* ── LAYOUT ── */
.app { display:flex; height:100vh; height:100dvh; }

/* ── SIDEBAR ── */
.sidebar {
  width:var(--sidebar); background:var(--bg2); border-right:1px solid var(--border);
  display:flex; flex-direction:column; flex-shrink:0; overflow:hidden;
  transition:background .25s, transform .3s ease;
  z-index:100;
}
.sidebar-header { padding:16px 14px 12px; border-bottom:1px solid var(--border); }
.logo { font-size:16px; font-weight:700; color:var(--text); display:flex; align-items:center; gap:8px; margin-bottom:12px; }
.logo-dot { width:9px; height:9px; border-radius:50%; background:var(--accent); box-shadow:0 0 8px var(--accent); animation:pulse 2s infinite; }
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.new-chat-btn { width:100%; padding:9px 12px; background:rgba(124,92,252,0.12); border:1px solid rgba(124,92,252,0.28); border-radius:10px; color:var(--accent2); font-family:'Syne',sans-serif; font-size:13px; font-weight:600; cursor:pointer; display:flex; align-items:center; gap:7px; transition:all .2s; }
.new-chat-btn:hover { background:rgba(124,92,252,0.22); }

/* ── SEARCH ── */
.search-wrap { padding:8px 14px 4px; }
.search-wrap-inner { position:relative; }
.search-input { width:100%; background:var(--input-bg); border:1px solid var(--border2); border-radius:8px; color:var(--text); font-family:'Syne',sans-serif; font-size:12px; padding:7px 10px 7px 30px; outline:none; transition:border-color .2s; }
.search-input::placeholder { color:var(--muted); }
.search-input:focus { border-color:rgba(124,92,252,.45); }
.search-icon { position:absolute; left:9px; top:50%; transform:translateY(-50%); font-size:13px; color:var(--muted); pointer-events:none; }

.chats-label { padding:10px 14px 4px; font-size:10px; font-family:'JetBrains Mono',monospace; color:var(--muted); letter-spacing:.1em; text-transform:uppercase; }
.chats-list { flex:1; overflow-y:auto; padding:4px 8px; scrollbar-width:thin; scrollbar-color:rgba(124,92,252,.2) transparent; }
.chat-item { padding:9px 10px; border-radius:8px; cursor:pointer; display:flex; align-items:center; gap:8px; transition:background .15s; position:relative; }
.chat-item:hover { background:rgba(124,92,252,0.08); }
.chat-item.active { background:rgba(124,92,252,0.14); }
.chat-item-icon { font-size:13px; opacity:.45; flex-shrink:0; }
.chat-item-text { flex:1; font-size:12.5px; color:var(--text2); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.chat-item.active .chat-item-text { color:var(--accent2); font-weight:600; }
.chat-actions { display:flex; gap:2px; opacity:0; transition:opacity .15s; flex-shrink:0; }
.chat-item:hover .chat-actions, .chat-item:active .chat-actions { opacity:1; }
.chat-rename, .chat-delete { background:none; border:none; cursor:pointer; font-size:13px; padding:2px 4px; border-radius:4px; transition:color .15s; }
.chat-rename { color:rgba(160,160,220,.6); }
.chat-rename:hover { color:var(--accent2); }
.chat-delete { color:rgba(255,80,80,.5); }
.chat-delete:hover { color:rgba(255,80,80,.9); }
.rename-input { flex:1; background:rgba(255,255,255,.08); border:1px solid rgba(124,92,252,.5); border-radius:5px; color:var(--text); font-family:'Syne',sans-serif; font-size:12.5px; padding:1px 6px; outline:none; width:100%; min-width:0; }

.sidebar-footer { padding:10px 14px; border-top:1px solid var(--border); font-size:11px; font-family:'JetBrains Mono',monospace; color:var(--muted); display:flex; align-items:center; gap:6px; }
.theme-btn { background:none; border:1px solid var(--border2); color:var(--muted); font-size:14px; width:28px; height:28px; border-radius:7px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .2s; margin-left:auto; }
.theme-btn:hover { border-color:var(--accent); color:var(--accent2); }
.free-badge { background:rgba(34,197,94,.12); border:1px solid rgba(34,197,94,.25); color:#4ade80; font-size:10px; padding:2px 7px; border-radius:20px; }

.install-btn { width:100%; margin-top:8px; padding:8px 12px; background:rgba(34,197,94,.1); border:1px solid rgba(34,197,94,.25); border-radius:10px; color:#4ade80; font-family:'Syne',sans-serif; font-size:12px; font-weight:600; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:7px; transition:all .2s; }
.install-btn:hover { background:rgba(34,197,94,.2); }

/* ── MOBILE OVERLAY ── */
.sidebar-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:99; opacity:0; transition:opacity .3s; }
.sidebar-overlay.show { opacity:1; }

/* ── MAIN ── */
.main { flex:1; display:flex; flex-direction:column; overflow:hidden; position:relative; min-width:0; }
.main::before { content:''; position:absolute; top:-100px; right:-100px; width:400px; height:400px; background:radial-gradient(circle,rgba(124,92,252,.07) 0%,transparent 70%); pointer-events:none; z-index:0; }

/* ── TOPBAR ── */
.topbar { padding:12px 16px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px; background:var(--topbar-bg); backdrop-filter:blur(12px); z-index:10; flex-shrink:0; transition:background .25s; }
.menu-btn { display:none; background:none; border:1px solid var(--border2); color:var(--text2); font-size:18px; width:34px; height:34px; border-radius:8px; cursor:pointer; align-items:center; justify-content:center; flex-shrink:0; transition:all .2s; }
.menu-btn:hover { border-color:var(--accent); color:var(--accent2); }
.topbar-title { font-size:13px; font-weight:600; color:var(--text2); flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; min-width:0; }
.mode-toggle { display:flex; background:var(--bg3); border:1px solid var(--border2); border-radius:9px; padding:3px; gap:2px; flex-shrink:0; }
.mode-btn { padding:5px 10px; border-radius:6px; border:none; background:transparent; color:var(--muted); font-family:'Syne',sans-serif; font-size:11px; cursor:pointer; transition:all .2s; white-space:nowrap; }
.mode-btn.active { background:var(--accent); color:#fff; }

.model-select-top { font-family:'JetBrains Mono',monospace; font-size:11px; background:var(--bg3); border:1px solid var(--border2); color:var(--text2); padding:5px 8px; border-radius:8px; outline:none; cursor:pointer; transition:border-color .2s; flex-shrink:0; }
.model-select-top:hover { border-color:rgba(124,92,252,.4); color:var(--accent2); }
.model-select-top option { background:var(--bg2); color:var(--text); }

/* ── MESSAGES ── */
.messages-wrap { flex:1; overflow-y:auto; padding:20px 0; scrollbar-width:thin; scrollbar-color:rgba(124,92,252,.2) transparent; z-index:1; }
.messages-inner { max-width:780px; margin:0 auto; padding:0 16px; display:flex; flex-direction:column; gap:16px; }

/* ── EMPTY STATE ── */
.empty-state { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:55vh; gap:10px; color:var(--muted); text-align:center; padding:0 16px; }
.empty-glyph { font-size:44px; background:linear-gradient(135deg,var(--accent),#c084fc); -webkit-background-clip:text; -webkit-text-fill-color:transparent; opacity:.65; }
.empty-title { font-size:20px; font-weight:700; color:var(--text2); }
.empty-sub { font-size:12px; font-family:'JetBrains Mono',monospace; color:var(--muted); }
.suggestions { display:flex; flex-wrap:wrap; gap:7px; justify-content:center; margin-top:6px; }
.suggest-btn { padding:7px 13px; background:var(--bg2); border:1px solid var(--border2); border-radius:20px; color:var(--text2); font-family:'Syne',sans-serif; font-size:12px; cursor:pointer; transition:all .2s; }
.suggest-btn:hover { border-color:rgba(124,92,252,.4); color:var(--accent2); }

/* ── MSG ROWS ── */
.msg { display:flex; gap:10px; animation:fadeUp .25s ease; }
.msg.user { flex-direction:row-reverse; }
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.avatar { width:30px; height:30px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:700; flex-shrink:0; margin-top:2px; }
.avatar.ai  { background:rgba(124,92,252,.18); color:var(--accent2); border:1px solid rgba(124,92,252,.28); }
.avatar.usr { background:var(--bg3); color:var(--text2); border:1px solid var(--border2); }
.bubble { max-width:80%; padding:10px 14px; border-radius:14px; font-size:14px; line-height:1.72; word-break:break-word; }
.msg.ai   .bubble { background:var(--bubble-ai-bg); border:1px solid var(--bubble-ai-bdr); color:var(--text); border-radius:4px 14px 14px 14px; }
.msg.user .bubble { background:var(--bubble-usr-bg); border:1px solid var(--bubble-usr-bdr); color:var(--bubble-usr-txt); border-radius:14px 4px 14px 14px; }

/* ── IMAGE MSG ── */
.img-msg { background:var(--img-frame-bg); border:1px solid var(--border2); border-radius:14px; overflow:hidden; max-width:380px; }
.img-msg img { display:block; width:100%; }
.img-msg-label { padding:7px 12px; font-size:12px; color:var(--muted); font-family:'JetBrains Mono',monospace; }
.img-download { display:inline-block; margin:0 12px 10px; padding:5px 14px; background:rgba(124,92,252,.15); border:1px solid rgba(124,92,252,.3); border-radius:7px; color:var(--accent2); font-size:12px; text-decoration:none; cursor:pointer; transition:background .2s; }
.img-download:hover { background:rgba(124,92,252,.28); }

/* ── CODE BLOCKS ── */
.code-block { margin:10px 0; border-radius:10px; overflow:hidden; border:1px solid rgba(255,255,255,.1); background:var(--code-bg); }
.code-header { display:flex; align-items:center; gap:8px; padding:7px 12px; background:var(--code-hdr); border-bottom:1px solid rgba(255,255,255,.07); }
.code-dots { display:flex; gap:5px; }
.code-dot { width:10px; height:10px; border-radius:50%; }
.code-dot.r{background:#ff5f57}.code-dot.y{background:#febc2e}.code-dot.g{background:#28c840}
.code-lang { font-family:'JetBrains Mono',monospace; font-size:11px; color:rgba(255,255,255,.4); letter-spacing:.06em; flex:1; }
.code-btns { display:flex; gap:5px; align-items:center; }
.code-copy,.code-download { background:none; border:1px solid rgba(255,255,255,.12); color:rgba(255,255,255,.4); font-family:'JetBrains Mono',monospace; font-size:10px; padding:3px 8px; border-radius:5px; cursor:pointer; transition:all .2s; white-space:nowrap; }
.code-copy:hover { background:rgba(255,255,255,.08); color:rgba(255,255,255,.8); }
.code-download:hover { background:rgba(99,220,120,.08); border-color:rgba(99,220,120,.3); color:#4ade80; }
.code-block pre { margin:0!important; border-radius:0!important; background:transparent!important; padding:12px 14px!important; overflow-x:auto; font-size:12.5px!important; line-height:1.6!important; }
.code-block code { font-family:'JetBrains Mono',monospace!important; }
.bubble code:not(.hljs) { background:var(--inline-code-bg); border:1px solid var(--inline-code-bdr); padding:1px 5px; border-radius:4px; font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--inline-code-col); }

/* ── IMAGE GEN OPTIONS ── */
.img-gen-opts { display:flex; gap:8px; flex-wrap:wrap; }
.img-gen-select { font-family:'JetBrains Mono',monospace; font-size:12px; background:var(--input-bg); border:1px solid var(--border2); color:var(--text); padding:6px 8px; border-radius:8px; outline:none; cursor:pointer; }
.img-gen-select option { background:#1a1a2e; }

/* ── TYPING ── */
.typing-wrap { display:flex; gap:10px; animation:fadeUp .25s ease; }
.typing-bubble { background:var(--bubble-ai-bg); border:1px solid var(--bubble-ai-bdr); padding:12px 16px; border-radius:4px 14px 14px 14px; display:flex; gap:5px; align-items:center; }
.dot { width:6px; height:6px; border-radius:50%; background:var(--accent); animation:bounce 1.2s infinite; }
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}

/* ── INPUT ── */
.input-area { padding:12px 16px 16px; z-index:10; flex-shrink:0; }
.input-inner { max-width:780px; margin:0 auto; display:flex; gap:8px; align-items:flex-end; }
.input-wrap { flex:1; background:var(--input-bg); border:1px solid var(--input-bdr); border-radius:14px; transition:border-color .2s; }
.input-wrap:focus-within { border-color:rgba(124,92,252,.5); box-shadow:0 0 0 3px rgba(124,92,252,.07); }
#user-input { width:100%; background:transparent; border:none; outline:none; color:var(--text); font-family:'Syne',sans-serif; font-size:14px; padding:11px 14px; resize:none; line-height:1.6; max-height:140px; overflow-y:auto; }
#user-input::placeholder { color:var(--muted); }
#send-btn { width:42px; height:42px; border-radius:11px; background:var(--accent); border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:background .2s,transform .1s; flex-shrink:0; font-size:16px; color:#fff; }
#send-btn:hover { background:#6540e0; }
#send-btn:active { transform:scale(.95); }
#send-btn:disabled { background:rgba(124,92,252,.3); cursor:not-allowed; }
.input-opts { max-width:780px; margin:6px auto 0; display:none; }
.input-opts.show { display:flex; gap:8px; flex-wrap:wrap; }
.input-hint { text-align:center; font-size:11px; font-family:'JetBrains Mono',monospace; color:var(--muted); margin-top:5px; opacity:.5; }

.hl { background:rgba(251,191,36,.35); border-radius:2px; }

/* ── FILE ATTACH ── */
#attach-btn { width:42px; height:42px; border-radius:11px; background:var(--bg3); border:1px solid var(--border2); color:var(--text2); font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:all .2s; }
#attach-btn:hover { border-color:var(--accent); color:var(--accent2); }
#file-input { display:none; }

.file-previews { max-width:780px; margin:0 auto 6px; display:flex; flex-wrap:wrap; gap:7px; }
.file-chip { display:flex; align-items:center; gap:6px; background:var(--bg3); border:1px solid var(--border2); border-radius:8px; padding:5px 9px; font-size:12px; color:var(--text2); max-width:200px; }
.file-chip-icon { font-size:15px; flex-shrink:0; }
.file-chip-name { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1; }
.file-chip-img { width:32px; height:32px; object-fit:cover; border-radius:5px; flex-shrink:0; }
.file-chip-del { background:none; border:none; color:rgba(255,80,80,.6); cursor:pointer; font-size:14px; padding:0 2px; flex-shrink:0; line-height:1; }
.file-chip-del:hover { color:rgba(255,80,80,1); }


/* uploaded file in bubble */
.bubble-file { display:inline-flex; align-items:center; gap:7px; background:var(--bg3); border:1px solid var(--border2); border-radius:8px; padding:6px 11px; margin-top:6px; font-size:12.5px; color:var(--text2); }

::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(124,92,252,.25);border-radius:3px}

/* ══════════════════════════════════════
   MOBILE  ≤ 640px
══════════════════════════════════════ */
@media (max-width: 640px) {
  :root { --sidebar: 85vw; }

  .sidebar {
    position: fixed;
    top: 0; left: 0; bottom: 0;
    transform: translateX(-100%);
    box-shadow: 4px 0 24px rgba(0,0,0,.4);
  }
  .sidebar.open { transform: translateX(0); }
  .sidebar-overlay { display: block; pointer-events:none; }
  .sidebar-overlay.show { pointer-events:auto; }

  .menu-btn { display: flex; }

  .mode-btn { padding: 5px 8px; font-size: 10px; }
  .topbar { padding: 10px 12px; gap: 6px; }
  .topbar-title { font-size: 12px; }
  .model-select-top { font-size: 10px; padding: 4px 6px; max-width: 110px; }

  .messages-inner { padding: 0 10px; gap: 14px; }
  .bubble { max-width: 88%; font-size: 13.5px; padding: 9px 12px; }
  .avatar { width: 26px; height: 26px; font-size: 9px; }

  .code-block pre { font-size: 11.5px!important; padding: 10px 12px!important; }
  .code-copy,.code-download { font-size: 10px; padding: 2px 6px; }
  .code-dots { display: none; }

  .img-msg { max-width: 100%; }

  .input-area { padding: 8px 10px 12px; }
  #user-input { font-size: 16px; /* prevents iOS zoom on focus */ padding: 10px 12px; }
  #send-btn { width: 40px; height: 40px; }

  .empty-title { font-size: 17px; }
  .suggest-btn { font-size: 11px; padding: 6px 11px; }
}

/* ── TABLET  641–900px ── */
@media (min-width: 641px) and (max-width: 900px) {
  :root { --sidebar: 240px; }
  .messages-inner { padding: 0 16px; }
  .bubble { max-width: 84%; }
}

/* ── PREVIEW PANEL ── */
.preview-panel { width:0; background:var(--bg2); border-left:1px solid var(--border); display:flex; flex-direction:column; overflow:hidden; transition:width .3s ease; flex-shrink:0; }
.preview-panel.open { width:45%; min-width:300px; }
.preview-header { padding:10px 14px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:8px; flex-shrink:0; background:var(--topbar-bg); }
.preview-title { font-size:12px; font-weight:600; color:var(--text2); flex:1; font-family:'JetBrains Mono',monospace; }
.preview-close { background:none; border:none; color:var(--muted); cursor:pointer; font-size:16px; padding:2px 6px; border-radius:4px; transition:color .15s; }
.preview-close:hover { color:var(--text); }
.preview-iframe { flex:1; width:100%; border:none; background:#fff; }
.preview-tabs { display:flex; gap:4px; padding:8px 12px; border-bottom:1px solid var(--border); background:var(--bg3); flex-shrink:0; }
.preview-tab { padding:4px 12px; border-radius:6px; border:1px solid var(--border2); background:transparent; color:var(--muted); font-family:'JetBrains Mono',monospace; font-size:11px; cursor:pointer; transition:all .2s; }
.preview-tab.active { background:var(--accent); color:#fff; border-color:var(--accent); }

/* ── COPY MSG BUTTON ── */
.msg-actions { display:flex; gap:4px; margin-top:5px; opacity:0; transition:opacity .2s; }
.msg:hover .msg-actions { opacity:1; }
.msg-action-btn { background:none; border:1px solid var(--border2); color:var(--muted); font-size:10px; font-family:'JetBrains Mono',monospace; padding:2px 8px; border-radius:5px; cursor:pointer; transition:all .15s; white-space:nowrap; }
.msg-action-btn:hover { background:var(--bg3); color:var(--text2); }

/* ── EDITABLE CODE ── */
.code-block pre[contenteditable] { outline:none; border:1px solid rgba(124,92,252,.4) !important; }
.code-edit-btn { background:none; border:1px solid rgba(255,255,255,.12); color:rgba(255,255,255,.4); font-family:'JetBrains Mono',monospace; font-size:10px; padding:3px 8px; border-radius:5px; cursor:pointer; transition:all .2s; white-space:nowrap; }
.code-edit-btn:hover { background:rgba(255,165,0,.1); border-color:rgba(255,165,0,.4); color:orange; }
.code-edit-btn.editing { background:rgba(124,92,252,.15); border-color:rgba(124,92,252,.5); color:var(--accent2); }

/* ── STREAMING CURSOR ── */
.stream-cursor::after { content:'▋'; animation:blink .7s infinite; color:var(--accent2); }
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

@media (max-width: 640px) {
  .preview-panel.open { position:fixed; inset:0; width:100% !important; z-index:200; }
  .msg-actions { opacity:1; }
}
@media (max-width: 900px) {
  .preview-panel.open { width:50%; }
}
</style>
</head>
<body>

<div class="sidebar-overlay" id="overlay" onclick="closeSidebar()"></div>

<div class="app">

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo"><div class="logo-dot"></div>AI Chat</div>
      <button class="new-chat-btn" onclick="newChat()">
        <span style="font-size:15px">＋</span> Новый чат
      </button>
      <button class="install-btn" id="install-btn" onclick="installPWA()">
        <span>📲</span> Добавить на экран
      </button>
    </div>

    <div class="search-wrap">
      <div class="search-wrap-inner">
        <span class="search-icon">🔍</span>
        <input class="search-input" id="search-input" type="text" placeholder="Поиск по чатам..." oninput="renderSidebar()">
      </div>
    </div>

    <div class="chats-label">Разговоры</div>
    <div class="chats-list" id="chats-list"></div>

    <div class="sidebar-footer">
      <span>pollinations.ai</span>
      <span class="free-badge">FREE</span>
      <button class="theme-btn" id="theme-btn" onclick="toggleTheme()" title="Сменить тему">🌙</button>
    </div>

  <main class="main">

      <span class="topbar-title" id="topbar-title">Новый чат</span>
      <select class="model-select-top" id="model-select-top" onchange="setModel(this.value)" title="Модель">
        <option value="openai">⚡ GPT-4o mini</option>
        <option value="gemini" selected>🌟 Gemini</option>
        <option value="gemini-thinking">🧠 Gemini Thinking</option>

      <div class="mode-toggle">
        <button class="mode-btn active" id="mode-chat" onclick="setMode('chat')">💬 Чат</button>
        <button class="mode-btn" id="mode-image" onclick="setMode('image')">🖼 Фото</button>

    <div class="messages-wrap" id="messages-wrap">

    <div class="input-area">
      <div class="file-previews" id="file-previews"></div>
      <div class="input-inner">
        <button id="attach-btn" onclick="document.getElementById('file-input').click()" title="Прикрепить файл">📎</button>
        <input type="file" id="file-input" multiple accept=".py,.js,.ts,.html,.css,.json,.txt,.md,.csv,.xml,.yaml,.yml,.java,.cpp,.c,.cs,.go,.rs,.php,.rb,.sh,.sql,.pdf">
        <div class="input-wrap">
          <textarea id="user-input" rows="1" placeholder="Напиши сообщение..."></textarea>
        </div>
        <button id="send-btn" onclick="handleSend()">➤</button>
        <button id="stop-btn" onclick="stopGeneration()" title="Остановить" style="display:none;width:42px;height:42px;border-radius:11px;background:rgba(255,80,80,.15);border:1px solid rgba(255,80,80,.35);color:#ff5f57;font-size:18px;cursor:pointer;flex-shrink:0;transition:all .2s;">⏹</button>
      </div>
      <div class="input-opts" id="img-opts">
        <select class="img-gen-select" id="img-size">
          <option value="1024x1024">1024×1024</option>
          <option value="1280x720">1280×720 (16:9)</option>
          <option value="720x1280">720×1280 (9:16)</option>
          <option value="512x512">512×512</option>
        </select>
        <select class="img-gen-select" id="img-style">
          <option value="">Стиль: любой</option>
          <option value="photorealistic">Фото</option>
          <option value="anime">Аниме</option>
          <option value="oil painting">Масло</option>
          <option value="watercolor">Акварель</option>

  <div class="preview-panel" id="preview-panel">

      <span class="preview-title" id="preview-title">preview.html</span>
      <div class="preview-tabs">
        <button class="preview-tab active" id="ptab-preview" onclick="switchPreviewTab('preview')">▶ Превью</button>
        <button class="preview-tab" id="ptab-code" onclick="switchPreviewTab('code')">{ } Код</button>
      </div>
      <button class="preview-close" onclick="closePreview()" title="Закрыть">✕</button>
    </div>
    <iframe class="preview-iframe" id="preview-iframe" sandbox="allow-scripts allow-same-origin"></iframe>
    <pre id="preview-code" style="display:none;flex:1;overflow:auto;padding:14px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--text);background:var(--code-bg);margin:0;"></pre>
  </div>

<script>
// ── STATE ──
let chats          = JSON.parse(localStorage.getItem('ai_chats') || '[]');
let current        = null;
let loading        = false;
let mode           = 'chat';
let currentModel   = localStorage.getItem('ai_model') || 'gemini';
let pendingFiles   = []; // {name, type, text}
let abortController = null;

// theme
const savedTheme = localStorage.getItem('ai_theme') || 'dark';
if (savedTheme === 'light') { document.body.classList.add('light'); document.getElementById('theme-btn').textContent = '☀️'; }

function toggleTheme() {
  const isLight = document.body.classList.toggle('light');
  document.getElementById('theme-btn').textContent = isLight ? '☀️' : '🌙';
  localStorage.setItem('ai_theme', isLight ? 'light' : 'dark');
}

function setModel(model) {
  currentModel = model;
  localStorage.setItem('ai_model', model);
}

// restore saved model
document.getElementById('model-select-top').value = currentModel;

// ── MOBILE SIDEBAR ──
function openSidebar() {
  document.getElementById('sidebar').classList.add('open');
  const ov = document.getElementById('overlay');
  ov.style.display = 'block';
  requestAnimationFrame(() => ov.classList.add('show'));
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  const ov = document.getElementById('overlay');
  ov.classList.remove('show');
  setTimeout(() => { if (!ov.classList.contains('show')) ov.style.display = 'none'; }, 300);
}

function setMode(m) {
  mode = m;
  document.getElementById('mode-chat').classList.toggle('active', m === 'chat');
  document.getElementById('mode-image').classList.toggle('active', m === 'image');
  const opts = document.getElementById('img-opts');
  opts.classList.toggle('show', m === 'image');
  document.getElementById('user-input').placeholder = m === 'image'
    ? 'Опиши картинку (желательно на английском)...'
    : 'Напиши сообщение...';
  document.getElementById('input-hint').textContent = m === 'image'
    ? 'Описание лучше на английском для точного результата'
    : 'Enter — отправить · Shift+Enter — перенос';
}

// ── INIT ──
if (chats.length === 0) newChat();
else { loadChat(chats[0].id); renderSidebar(); }

// ── CHAT MANAGEMENT ──
function newChat() {
  const id = 'chat_' + Date.now();
  chats.unshift({ id, title:'Новый чат', messages:[] });
  save(); loadChat(id); renderSidebar(); closeSidebar();
}
function loadChat(id) {
  current = id;
  const chat = getChat(); if (!chat) return;
  document.getElementById('topbar-title').textContent = chat.title;
  renderMessages(); renderSidebar(); closeSidebar();
}
function getChat() { return chats.find(c => c.id === current); }
function deleteChat(id, e) {
  e.stopPropagation();
  chats = chats.filter(c => c.id !== id);
  save();
  if (current === id) { chats.length === 0 ? newChat() : loadChat(chats[0].id); }
  else renderSidebar();
}
function save() { localStorage.setItem('ai_chats', JSON.stringify(chats)); }

function uniqueTitle(title, excludeId) {
  const ex = chats.filter(c => c.id !== excludeId).map(c => c.title);
  if (!ex.includes(title)) return title;
  let n = 1;
  while (ex.includes(title + '(' + n + ')')) n++;
  return title + '(' + n + ')';
}

function startRename(id, e) {
  e.stopPropagation();
  const item   = e.target.closest('.chat-item');
  const textEl = item.querySelector('.chat-item-text');
  const chat   = chats.find(c => c.id === id); if (!chat) return;
  const input  = document.createElement('input');
  input.type = 'text'; input.value = chat.title; input.className = 'rename-input';
  textEl.replaceWith(input); input.focus(); input.select();
  function commit() {
    const val = input.value.trim();
    if (val && val !== chat.title) {
      chat.title = uniqueTitle(val, id);
      if (id === current) document.getElementById('topbar-title').textContent = chat.title;
      save();
    }
    renderSidebar();
  }
  input.addEventListener('blur', commit);
  input.addEventListener('keydown', e2 => {
    if (e2.key === 'Enter')  { e2.preventDefault(); input.blur(); }
    if (e2.key === 'Escape') { input.value = chat.title; input.blur(); }
  });
}

// ── SIDEBAR ──
function renderSidebar() {
  const query  = (document.getElementById('search-input').value || '').toLowerCase().trim();
  const list   = document.getElementById('chats-list');
  list.innerHTML = '';
  const filtered = query ? chats.filter(c => c.title.toLowerCase().includes(query)) : chats;
  if (filtered.length === 0) {
    list.innerHTML = '<div style="padding:20px 14px;font-size:12px;color:var(--muted);text-align:center">Ничего не найдено</div>';
    return;
  }
  filtered.forEach(chat => {
    const el = document.createElement('div');
    el.className = 'chat-item' + (chat.id === current ? ' active' : '');
    el.onclick = () => loadChat(chat.id);
    const titleHtml = query
      ? escHtml(chat.title).replace(new RegExp(escRegex(escHtml(query)),'gi'), m => `<span class="hl">${m}</span>`)
      : escHtml(chat.title);
    el.innerHTML = `
      <span class="chat-item-icon">💬</span>
      <span class="chat-item-text">${titleHtml}</span>
      <div class="chat-actions">
        <button class="chat-rename" title="Переименовать">✏</button>
        <button class="chat-delete" title="Удалить">✕</button>
      </div>`;
    el.querySelector('.chat-rename').onclick = e => startRename(chat.id, e);
    el.querySelector('.chat-delete').onclick = e => deleteChat(chat.id, e);
    list.appendChild(el);
  });
}
function escRegex(s) { return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'); }

// ── MESSAGES ──
function renderMessages() {
  const chat = getChat();
  const el   = document.getElementById('messages');
  if (!chat || chat.messages.length === 0) {
    el.innerHTML = `
      <div class="empty-state">
        <div class="empty-glyph">✦</div>
        <div class="empty-title">Начни разговор</div>
        <div class="empty-sub">pollinations.ai · без ключа · без лимитов</div>
        <div class="suggestions">
          <button class="suggest-btn" onclick="quickSend('Напиши Hello World на Python')">Python Hello World</button>
          <button class="suggest-btn" onclick="quickSend('Объясни нейросети простыми словами')">Что такое нейросети?</button>
          <button class="suggest-btn" onclick="quickSend('Напиши сортировку пузырьком на JavaScript')">Сортировка на JS</button>
          <button class="suggest-btn" onclick="quickSend('Придумай 5 идей для стартапа')">Идеи для стартапа</button>
        </div>
      </div>`;
    return;
  }
  el.innerHTML = '';
  chat.messages.forEach(m => appendMsgEl(m.role, m.content, m.type, false));
  scrollBottom();
}

function appendMsgEl(role, content, type, animate, attachments) {
  const el = document.getElementById('messages');
  const es = el.querySelector('.empty-state'); if (es) es.remove();

  if (type === 'image') {
    const wrap = document.createElement('div');
    wrap.className = 'msg ai'; if (!animate) wrap.style.animation = 'none';
    const av = document.createElement('div'); av.className = 'avatar ai'; av.textContent = 'AI';
    const frame = document.createElement('div'); frame.className = 'img-msg';
    const img = document.createElement('img'); img.src = content; img.alt = 'Generated';
    img.onerror = () => { frame.innerHTML = '<div class="img-msg-label">⚠ Не удалось загрузить</div>'; };
    const label = document.createElement('div'); label.className = 'img-msg-label'; label.textContent = '🖼 Pollinations Image';
    const dl = document.createElement('a'); dl.className = 'img-download'; dl.href = content; dl.download = 'image.jpg'; dl.target = '_blank'; dl.textContent = '↓ Скачать';
    frame.appendChild(img); frame.appendChild(label); frame.appendChild(dl);
    wrap.appendChild(av); wrap.appendChild(frame); el.appendChild(wrap);
    scrollBottom(); return;
  }

  const wrap = document.createElement('div');
  wrap.className = 'msg ' + (role === 'user' ? 'user' : 'ai');
  if (!animate) wrap.style.animation = 'none';
  const av = document.createElement('div');
  av.className = 'avatar ' + (role === 'user' ? 'usr' : 'ai');
  av.textContent = role === 'user' ? 'Вы' : 'AI';
  const bubble = document.createElement('div'); bubble.className = 'bubble';
    let html = role === 'ai' ? formatMessage(content) : escHtml(content).replace(/\n/g,'<br>');
  if (attachments && attachments.length) {
    for (const f of attachments) {
      html += '<div class="bubble-file">' + fileIcon(f.name) + ' ' + escHtml(f.name) + '</div>';
    }
  }
  bubble.innerHTML = html;
  wrap.appendChild(av); wrap.appendChild(bubble); el.appendChild(wrap);

  // Robust highlight: retry up to 3 times with increasing delay for large code blocks
  function tryHighlight(el, attempt) {
    const blocks = el.querySelectorAll('pre code:not(.hljs)');
    if (blocks.length === 0) return;
    blocks.forEach(b => {
      try { hljs.highlightElement(b); } catch(e) {}
    });
    // if some still not highlighted, retry
    const remaining = el.querySelectorAll('pre code:not(.hljs)');
    if (remaining.length > 0 && attempt < 3) {
      setTimeout(() => tryHighlight(el, attempt + 1), 120 * attempt + 80);
    }
  }
  requestAnimationFrame(() => tryHighlight(wrap, 1));

  // ── Message action buttons (copy, edit for user) ──
  const actions = document.createElement('div');
  actions.className = 'msg-actions';
  if (role === 'user') {
    const editBtn = document.createElement('button');
    editBtn.className = 'msg-action-btn'; editBtn.textContent = '✏ изменить';
    editBtn.onclick = () => {
      const old = bubble.querySelector('span') ? bubble.querySelector('span').textContent : bubble.innerText;
      document.getElementById('user-input').value = old;
      document.getElementById('user-input').focus();
      wrap.remove();
      const chat = getChat();
      if (chat) { chat.messages = chat.messages.slice(0, -1); save(); }
    };
    actions.appendChild(editBtn);
  }
  const copyBtn = document.createElement('button');
  copyBtn.className = 'msg-action-btn'; copyBtn.textContent = '⎘ копировать';
  copyBtn.onclick = () => {
    // get plain text from bubble
    const text = bubble.innerText || bubble.textContent;
    navigator.clipboard.writeText(text).then(() => {
      copyBtn.textContent = '✓ скопировано';
      setTimeout(() => copyBtn.textContent = '⎘ копировать', 1800);
    });
  };
  actions.appendChild(copyBtn);
  wrap.appendChild(actions);
  // ── Edit button ──
  wrap.querySelectorAll('.code-edit-btn').forEach(btn => {
    btn.onclick = () => {
      const block = btn.closest('.code-block');
      const pre   = block.querySelector('pre');
      const isEditing = btn.classList.contains('editing');
      if (!isEditing) {
        pre.contentEditable = 'true';
        pre.focus();
        btn.classList.add('editing');
        btn.textContent = '✓ готово';
        // add preview button if HTML
        const lang = block.querySelector('.code-lang').textContent.trim();
        if ((lang === 'html' || lang === 'HTML') && !block.querySelector('.code-preview-btn')) {
          const pb = document.createElement('button');
          pb.className = 'code-edit-btn'; pb.textContent = '▶ превью';
          pb.onclick = () => openPreview(pre.innerText || pre.textContent, block.querySelector('.code-lang').textContent.trim());
          btn.parentNode.insertBefore(pb, btn);
        }
      } else {
        pre.contentEditable = 'false';
        btn.classList.remove('editing');
        btn.textContent = '✏ редактировать';
        // re-highlight
        const code = pre.querySelector('code');
        if (code) { code.removeAttribute('data-highlighted'); code.classList.remove('hljs'); hljs.highlightElement(code); }
      }
    };
  });

  // ── Auto-show preview for HTML blocks ──
  wrap.querySelectorAll('.code-block').forEach(block => {
    const lang = (block.querySelector('.code-lang').textContent || '').trim().toLowerCase();
    if (lang === 'html') {
      const code = block.querySelector('code');
      if (code && !block.querySelector('.code-preview-btn')) {
        const pb = document.createElement('button');
        pb.className = 'code-edit-btn code-preview-btn'; pb.textContent = '▶ превью';
        pb.onclick = () => openPreview(code.innerText || code.textContent, 'html');
        block.querySelector('.code-btns').prepend(pb);
        // auto-open preview
        setTimeout(() => openPreview(code.innerText || code.textContent, 'html'), 100);
      }
    }
  });

  wrap.querySelectorAll('.code-copy').forEach(btn => {
    btn.onclick = () => {
      navigator.clipboard.writeText(btn.closest('.code-block').querySelector('code').innerText).then(() => {
        btn.textContent = '✓ скопировано'; setTimeout(() => btn.textContent = '⎘ копировать', 1800);
      });
    };
  });
  wrap.querySelectorAll('.code-download').forEach(btn => {
    btn.onclick = () => {
      const block = btn.closest('.code-block');
      const code  = block.querySelector('code').innerText;
      const lang  = block.querySelector('.code-lang').textContent.trim();
      const blob  = new Blob([code],{type:'text/plain'});
      const url   = URL.createObjectURL(blob);
      const a     = document.createElement('a'); a.href=url; a.download='code.'+langToExt(lang); a.click();
      URL.revokeObjectURL(url);
      btn.textContent = '✓ скачано'; setTimeout(() => btn.textContent = '↓ скачать', 1800);
    };
  });
  scrollBottom();
}

// ── FORMAT ──
function formatMessage(text) {
  const blocks = [];
  text = text.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) => {
    const label = lang || 'code';
    const html  = `<div class="code-block">
      <div class="code-header">
        <div class="code-dots"><div class="code-dot r"></div><div class="code-dot y"></div><div class="code-dot g"></div></div>
        <span class="code-lang">${label}</span>
        <div class="code-btns">
          <button class="code-edit-btn">✏ редактировать</button>
          <button class="code-copy">⎘ копировать</button>
          <button class="code-download">↓ скачать</button>
        </div>
      </div>
      <pre><code class="language-${label}">${escHtml(code.trim())}</code></pre>
    </div>`;
    blocks.push(html);
    return '\x00B' + (blocks.length-1) + '\x00';
  });
  text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');
  text = text.replace(/\n/g, '<br>');
  text = text.replace(/\x00B(\d+)\x00/g, (_, i) => blocks[+i]);
  return text;
}

function escHtml(t) { return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function langToExt(lang) {
  const m = {python:'py',javascript:'js',typescript:'ts',html:'html',css:'css',java:'java',cpp:'cpp',c:'c',cs:'cs',go:'go',rust:'rs',php:'php',ruby:'rb',swift:'swift',kotlin:'kt',bash:'sh',shell:'sh',sql:'sql',json:'json',xml:'xml',yaml:'yml',markdown:'md',lua:'lua',dart:'dart',scala:'scala',perl:'pl'};
  return m[(lang||'').toLowerCase()] || 'txt';
}

// ── TYPING ──
function showTyping() {
  const el = document.getElementById('messages');
  const es = el.querySelector('.empty-state'); if (es) es.remove();
  const w  = document.createElement('div'); w.className='typing-wrap'; w.id='typing';
  w.innerHTML = '<div class="avatar ai">AI</div><div class="typing-bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
  el.appendChild(w); scrollBottom();
}
function removeTyping() { const t=document.getElementById('typing'); if(t) t.remove(); }
function scrollBottom() { const w=document.getElementById('messages-wrap'); setTimeout(()=>w.scrollTop=w.scrollHeight,30); }

// ── SEND ──
function handleSend() { mode==='image' ? generateImage() : sendMessage(); }

function stopGeneration() {
  if (abortController) { abortController.abort(); }
}

function setLoading(on) {
  loading = on;
  document.getElementById('send-btn').style.display = on ? 'none' : 'flex';
  document.getElementById('stop-btn').style.display  = on ? 'flex' : 'none';
  document.getElementById('send-btn').disabled = on;
}

function buildContentWithAttachments(text, attachments) {
  if (!attachments || attachments.length === 0) return text || '';
  let fullText = text || '';
  for (const f of attachments) {
    if (f.text) {
      const lang = f.name.split('.').pop().toLowerCase();
      fullText += '\n\n--- Файл: ' + f.name + ' ---\n```' + lang + '\n' + f.text + '\n```';
    }
  }
  return fullText;
}

const SYSTEM_PROMPT = {
  role:'system',
  content:'You are a helpful assistant with vision capabilities. When the user message contains image_url content blocks, you MUST analyze and describe those images in detail — you can see them. When writing code, ALWAYS write the COMPLETE, FULLY WORKING code — never truncate, never use placeholders like "// ... rest of code" or "...". Always finish what you start.'
};

async function sendMessage() {
  const input = document.getElementById('user-input');
  const text  = input.value.trim();
  if (!text || loading) return;
  const chat = getChat(); if (!chat) return;
  setLoading(true);
  input.value = ''; input.style.height = 'auto';
  const { display: displayText, attachments } = buildDisplayContent(text);
  chat.messages.push({ role:'user', content: displayText, attachments });
  if (chat.messages.length === 1) {
    chat.title = (text||attachments[0]?.name||'Файл').slice(0,40);
    document.getElementById('topbar-title').textContent = chat.title;
  }
  const filesSnapshot = [...pendingFiles];
  pendingFiles = []; renderFilePreviews();
  save(); appendMsgEl('user', displayText, null, true, attachments); showTyping(); renderSidebar();
  try {
    abortController = new AbortController();
    const msgs = [SYSTEM_PROMPT, ...chat.messages.map(m => {
      const content = m.role==='user' && m.attachments?.length
        ? buildContentWithAttachments(m.content, m.attachments)
        : m.content;
      return { role:m.role==='ai'?'assistant':m.role, content };
    })];
    // Choose endpoint and model string
    const modelMap = {
      'openai':           { url:'https://text.pollinations.ai/openai',      model:'openai' },
      'gemini':           { url:'https://text.pollinations.ai/openai',      model:'gemini' },
      'gemini-thinking':  { url:'https://text.pollinations.ai/openai',      model:'gemini-thinking' },
      'mistral':          { url:'https://text.pollinations.ai/openai',      model:'mistral' },
      'llama':            { url:'https://text.pollinations.ai/openai',      model:'llama' },
    };
    const { url: apiUrl, model: modelStr } = modelMap[currentModel] || modelMap['gemini'];

    const resp = await fetch(apiUrl, {
      method:'POST', headers:{'Content-Type':'application/json'},
      signal: abortController.signal,
      body:JSON.stringify({ model:modelStr, messages:msgs, max_tokens:4096, stream:true, seed:Math.floor(Math.random()*99999) })
    });
    if (!resp.ok) throw new Error('HTTP ' + resp.status);

    // ── STREAMING ──
    removeTyping();
    // Create streaming bubble
    const streamWrap = document.createElement('div');
    streamWrap.className = 'msg ai'; streamWrap.style.animation = 'none';
    const streamAv = document.createElement('div'); streamAv.className = 'avatar ai';
    const modelEmoji = {'openai':'⚡','gemini':'🌟','gemini-thinking':'🧠','mistral':'🔥','llama':'🦙'};
    streamAv.textContent = modelEmoji[currentModel] || 'AI';
    streamAv.title = currentModel;
    const streamBubble = document.createElement('div'); streamBubble.className = 'bubble stream-cursor';
    streamWrap.appendChild(streamAv); streamWrap.appendChild(streamBubble);
    document.getElementById('messages').querySelector('.empty-state')?.remove();
    document.getElementById('messages').appendChild(streamWrap);
    scrollBottom();

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let reply = '';
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop(); // Оставляем последний (неполный) кусок в буфере

      // Parse SSE lines
      for (const line of lines) {
        if (!line.trim().startsWith('data:')) continue;
        const data = line.trim().slice(5).trim();
        if (data === '[DONE]') continue; 
        
        try {
          const json = JSON.parse(data);
          const delta = json.choices?.[0]?.delta?.content || '';
          if (delta) {
            reply += delta;
            
            // Фикс отображения HTML: временно закрываем кавычки блока кода на лету
            let displayReply = reply;
            if ((displayReply.match(/```/g) || []).length % 2 !== 0) {
              displayReply += '\n```';
            }
            
            streamBubble.innerHTML = formatMessage(displayReply);
            scrollBottom();
          }
        } catch(e) {}
      }
    }

    // Final render with full formatting + highlight
    streamBubble.classList.remove('stream-cursor');
    streamBubble.innerHTML = formatMessage(reply);
    requestAnimationFrame(() => tryHighlight(streamBubble, 1));

    // Add action buttons
    const actions = document.createElement('div'); actions.className = 'msg-actions';
    const copyBtn = document.createElement('button'); copyBtn.className = 'msg-action-btn'; copyBtn.textContent = '⎘ копировать';
    copyBtn.onclick = () => { navigator.clipboard.writeText(reply).then(() => { copyBtn.textContent = '✓ скопировано'; setTimeout(() => copyBtn.textContent = '⎘ копировать', 1800); }); };
    actions.appendChild(copyBtn); streamWrap.appendChild(actions);

    // Wire code block buttons in streamed message
    streamWrap.querySelectorAll('.code-copy').forEach(btn => {
      btn.onclick = () => { navigator.clipboard.writeText(btn.closest('.code-block').querySelector('code').innerText).then(() => { btn.textContent = '✓'; setTimeout(() => btn.textContent = '⎘ копировать', 1800); }); };
    });
    streamWrap.querySelectorAll('.code-download').forEach(btn => {
      btn.onclick = () => { const block=btn.closest('.code-block'); const code=block.querySelector('code').innerText; const lang=block.querySelector('.code-lang').textContent.trim(); const blob=new Blob([code],{type:'text/plain'}); const url=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url; a.download='code.'+langToExt(lang); a.click(); URL.revokeObjectURL(url); };
    });
    streamWrap.querySelectorAll('.code-edit-btn').forEach(btn => {
      btn.onclick = () => { const block=btn.closest('.code-block'); const pre=block.querySelector('pre'); const isEditing=btn.classList.contains('editing'); if(!isEditing){pre.contentEditable='true';pre.focus();btn.classList.add('editing');btn.textContent='✓ готово';}else{pre.contentEditable='false';btn.classList.remove('editing');btn.textContent='✏ редактировать';const code=pre.querySelector('code');if(code){code.removeAttribute('data-highlighted');code.classList.remove('hljs');hljs.highlightElement(code);}}};
    });
    // Auto-preview HTML
    streamWrap.querySelectorAll('.code-block').forEach(block => {
      const lang = (block.querySelector('.code-lang').textContent||'').trim().toLowerCase();
      if (lang === 'html') {
        const code = block.querySelector('code');
        if (code && !block.querySelector('.code-preview-btn')) {
          const pb = document.createElement('button'); pb.className='code-edit-btn code-preview-btn'; pb.textContent='▶ превью';
          pb.onclick = () => openPreview(code.innerText||code.textContent, 'html');
          block.querySelector('.code-btns').prepend(pb);
          setTimeout(() => openPreview(code.innerText||code.textContent, 'html'), 150);
        }
      }
    });

    chat.messages.push({ role:'ai', content:reply });
    save();
  } catch(e) {
    removeTyping();
    if (e.name === 'AbortError') {
      // user stopped — show partial marker
      const stopped = '⏹ Остановлено';
      chat.messages.push({ role:'ai', content: stopped });
      save(); appendMsgEl('ai', stopped, null, true);
    } else {
      const err = '⚠ Ошибка: ' + e.message;
      chat.messages.push({ role:'ai', content:err });
      save(); appendMsgEl('ai', err, null, true);
    }
  }
  abortController = null;
  setLoading(false); input.focus();
}

async function generateImage() {
  const input = document.getElementById('user-input');
  const prompt = input.value.trim();
  if (!prompt || loading) return;
  const chat = getChat(); if (!chat) return;
  const size  = document.getElementById('img-size').value;
  const style = document.getElementById('img-style').value;
  const [w, h] = size.split('x');
  const fullPrompt = style ? prompt + ', ' + style : prompt;
  const url = `https://image.pollinations.ai/prompt/${encodeURIComponent(fullPrompt)}?width=${w}&height=${h}&seed=${Math.floor(Math.random()*999999)}&nologo=true`;
  loading = true; document.getElementById('send-btn').disabled = true;
  input.value = ''; input.style.height = 'auto';
  chat.messages.push({ role:'user', content:prompt });
  if (chat.messages.length === 1) {
    chat.title = '🖼 ' + prompt.slice(0,35)+(prompt.length>35?'…':'');
    document.getElementById('topbar-title').textContent = chat.title;
  }
  save(); appendMsgEl('user', prompt, null, true); showTyping(); renderSidebar();
  await new Promise(resolve => {
    const img = new Image(); img.onload = resolve; img.onerror = resolve; img.src = url;
    setTimeout(resolve, 20000);
  });
  removeTyping();
  chat.messages.push({ role:'ai', content:url, type:'image' });
  save(); appendMsgEl('ai', url, 'image', true);
  loading = false; document.getElementById('send-btn').disabled = false; input.focus();
}

// ── FILE HANDLING ──
function fileIcon(name) {
  const ext = (name||'').split('.').pop().toLowerCase();
  const icons = {py:'🐍',js:'🟨',ts:'🔷',html:'🌐',css:'🎨',json:'📋',md:'📝',txt:'📄',csv:'📊',sql:'🗄',sh:'⚙',pdf:'📕',xml:'📰',yaml:'⚙',yml:'⚙',java:'☕',cpp:'⚙',c:'⚙',cs:'🔷',go:'🐹',rs:'🦀',php:'🐘',rb:'💎'};
  return icons[ext] || '📎';
}

function renderFilePreviews() {
  const container = document.getElementById('file-previews');
  container.innerHTML = '';
  pendingFiles.forEach((f, i) => {
    const chip = document.createElement('div');
    chip.className = 'file-chip';
    chip.innerHTML = `<span class="file-chip-icon">${fileIcon(f.name)}</span><span class="file-chip-name">${escHtml(f.name)}</span><button class="file-chip-del" onclick="removeFile(${i})">✕</button>`;
    container.appendChild(chip);
  });
}

function removeFile(i) {
  pendingFiles.splice(i, 1);
  renderFilePreviews();
}

document.getElementById('file-input').addEventListener('change', async function() {
  const files = Array.from(this.files);
  for (const file of files) {
    let text = '';
    try {
      text = await new Promise(res => {
        const r = new FileReader(); r.onload = () => res(r.result); r.readAsText(file);
      });
    } catch(e) { text = ''; }
    pendingFiles.push({ name: file.name, type: file.type, text });
  }
  this.value = '';
  renderFilePreviews();
});

// Build content array for API (images as base64, text files as text)
function buildUserContent(text) {
  if (pendingFiles.length === 0) return text;
  const parts = [];
  if (text) parts.push({ type:'text', text });
  for (const f of pendingFiles) {
    if (f.type.startsWith('image/')) {
      const b64 = f.dataUrl.split(',')[1];
      parts.push({ type:'image_url', image_url:{ url: `data:${f.type};base64,${b64}` } });
    } else if (f.text !== null) {
      parts.push({ type:'text', text: `\n\n--- Файл: ${f.name} ---\n${f.text}` });
    }
  }
  return parts.length === 1 && typeof parts[0] === 'object' && parts[0].type === 'text' ? parts[0].text : parts;
}

// Build display string for saving to chat history
function buildDisplayContent(text) {
  if (pendingFiles.length === 0) return { display: text, attachments: [] };
  return { display: text, attachments: pendingFiles.map(f => ({ name:f.name, type:f.type, text:f.text })) };
}

// ── PREVIEW PANEL ──
let previewCurrentCode = '';

function openPreview(htmlCode, lang) {
  previewCurrentCode = htmlCode;
  const panel = document.getElementById('preview-panel');
  document.getElementById('preview-title').textContent = lang === 'html' ? 'preview.html' : lang;
  panel.classList.add('open');
  // Set iframe content
  const iframe = document.getElementById('preview-iframe');
  iframe.srcdoc = htmlCode;
  // Set code view
  document.getElementById('preview-code').textContent = htmlCode;
  switchPreviewTab('preview');
}

function closePreview() {
  document.getElementById('preview-panel').classList.remove('open');
}

function switchPreviewTab(tab) {
  document.getElementById('ptab-preview').classList.toggle('active', tab === 'preview');
  document.getElementById('ptab-code').classList.toggle('active', tab === 'code');
  document.getElementById('preview-iframe').style.display   = tab === 'preview' ? 'block' : 'none';
  document.getElementById('preview-code').style.display     = tab === 'code'    ? 'block' : 'none';
}

function quickSend(t) { document.getElementById('user-input').value = t; sendMessage(); }

// ── INPUT EVENTS ──
const inputEl = document.getElementById('user-input');
inputEl.addEventListener('keydown', e => {
  // on mobile don't intercept Enter (let user use newlines naturally)
  const isMobile = window.innerWidth <= 640;
  if (e.key === 'Enter' && !e.shiftKey && !isMobile) { e.preventDefault(); handleSend(); }
});
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + 'px';
});

// swipe to close sidebar on mobile
let touchStartX = 0;
document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, {passive:true});
document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (dx < -60 && document.getElementById('sidebar').classList.contains('open')) closeSidebar();
}, {passive:true});

// ── PWA ──

const manifest = {
  name: 'AI Chat — Pollinations',
  short_name: 'AI Chat',
  description: 'Бесплатный AI чат без API ключа',
  start_url: '.',
  display: 'standalone',
  background_color: '#0d0d14',
  theme_color: '#7c5cfc',
  icons: [
    { src: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" rx="20" fill="%237c5cfc"/><text y=".9em" font-size="80" x="10">✦</text></svg>', sizes: '192x192', type: 'image/svg+xml' },
    { src: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" rx="20" fill="%237c5cfc"/><text y=".9em" font-size="80" x="10">✦</text></svg>', sizes: '512x512', type: 'image/svg+xml' }
  ]
};
const manifestBlob = new Blob([JSON.stringify(manifest)], {type:'application/json'});
document.getElementById('pwa-manifest').href = URL.createObjectURL(manifestBlob);

// Service worker for offline support
if ('serviceWorker' in navigator) {
  const swCode = `
    self.addEventListener('install', e => { self.skipWaiting(); });
    self.addEventListener('fetch', e => { e.respondWith(fetch(e.request).catch(() => new Response('Offline'))); });
  `;
  const swBlob = new Blob([swCode], {type:'application/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(swBlob)).catch(()=>{});
}

// Install prompt
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
});
window.addEventListener('appinstalled', () => {
  deferredPrompt = null;
  document.getElementById('install-btn').textContent = '✓ Установлено!';
  setTimeout(() => {
    document.getElementById('install-btn').innerHTML = '<span>📲</span> Добавить на экран';
  }, 3000);
});

async function installPWA() {
  if (deferredPrompt) {
    // Chrome/Android — native prompt
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    deferredPrompt = null;
    return;
  }
  // Show modal with instructions
  showInstallModal();
}

function showInstallModal() {
  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent.toLowerCase());
  const isMac = /macintosh|mac os/i.test(navigator.userAgent.toLowerCase());
  const existing = document.getElementById('install-modal');
  if (existing) existing.remove();

  let steps = '';
  if (isIOS) {
    steps = '<b>Safari на iPhone/iPad:</b><br>1. Нажми кнопку <b>⬜↑ Поделиться</b> внизу<br>2. Прокрути и нажми <b>"На экран домой"</b><br>3. Нажми <b>Добавить</b>';
  } else if (isMac) {
    steps = '<b>Safari на Mac:</b><br>1. Меню <b>Файл → Добавить в Dock</b><br><br><b>Chrome на Mac:</b><br>1. Нажми <b>⋮</b> справа вверху<br>2. Нажми <b>"Установить AI Chat"</b>';
  } else {
    steps = '<b>Chrome / Edge на Android/Windows:</b><br>1. Нажми <b>⋮</b> в правом верхнем углу<br>2. Нажми <b>"Установить приложение"</b> или <b>"Добавить на гл. экран"</b><br><br><b>Samsung Internet:</b><br>1. Нажми <b>☰</b> → <b>"Добавить на экран"</b>';
  }

  const modal = document.createElement('div');
  modal.id = 'install-modal';
  modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px;';
  modal.innerHTML = `
    <div style="background:var(--bg2);border:1px solid var(--border2);border-radius:16px;padding:24px;max-width:360px;width:100%;">
      <div style="font-size:17px;font-weight:700;color:var(--text);margin-bottom:14px;">📲 Добавить на главный экран</div>
      <div style="font-size:13.5px;color:var(--text2);line-height:1.8;">${steps}</div>
      <button onclick="document.getElementById('install-modal').remove()" style="margin-top:18px;width:100%;padding:10px;background:var(--accent);border:none;border-radius:10px;color:#fff;font-family:'Syne',sans-serif;font-size:14px;font-weight:600;cursor:pointer;">Понятно</button>
    </div>`;
  modal.addEventListener('click', e => { if (e.target === modal) modal.remove(); });
  document.body.appendChild(modal);
}
