<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
<meta name="theme-color" content="#0d0d14">
<title>AI Chat — Pollinations</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  -webkit-tap-highlight-color: transparent;
}

:root {
  --bg: #0d0d14;
  --bg2: #13131e;
  --bg3: #1a1a28;
  --border: rgba(255,255,255,0.06);
  --border2: rgba(255,255,255,0.12);
  --accent: #7c5cfc;
  --accent2: #a78bfa;
  --text: rgba(255,255,255,0.88);
  --text2: rgba(255,255,255,0.55);
  --muted: rgba(255,255,255,0.30);
  --bubble-ai-bg: rgba(255,255,255,0.04);
  --bubble-ai-bdr: rgba(255,255,255,0.08);
  --bubble-usr-bg: rgba(124,92,252,0.18);
  --bubble-usr-bdr: rgba(124,92,252,0.35);
  --bubble-usr-txt: #e4ddff;
  --input-bg: rgba(255,255,255,0.05);
  --input-bdr: rgba(255,255,255,0.12);
  --topbar-bg: rgba(13,13,20,0.92);
  --code-bg: #161622;
  --code-hdr: rgba(255,255,255,0.05);
  --inline-code-bg: rgba(124,92,252,0.18);
  --inline-code-bdr: rgba(124,92,252,0.28);
  --inline-code-col: #a78bfa;
  --img-frame-bg: rgba(255,255,255,0.04);
  --sidebar: 280px;
}

body.light {
  --bg: #f4f4f8;
  --bg2: #ffffff;
  --bg3: #eaeaf0;
  --border: rgba(0,0,0,0.06);
  --border2: rgba(0,0,0,0.12);
  --accent: #6c47f5;
  --accent2: #5535d4;
  --text: #1a1a2e;
  --text2: #5a5a7a;
  --muted: #9898b8;
  --bubble-ai-bg: #ffffff;
  --bubble-ai-bdr: rgba(0,0,0,0.08);
  --bubble-usr-bg: rgba(108,71,245,0.10);
  --bubble-usr-bdr: rgba(108,71,245,0.25);
  --bubble-usr-txt: #2d1a7a;
  --input-bg: #ffffff;
  --input-bdr: rgba(0,0,0,0.12);
  --topbar-bg: rgba(244,244,248,0.94);
  --code-bg: #1e1e2e;
  --code-hdr: rgba(0,0,0,0.5);
  --inline-code-bg: rgba(108,71,245,0.10);
  --inline-code-bdr: rgba(108,71,245,0.22);
  --inline-code-col: #5535d4;
  --img-frame-bg: rgba(0,0,0,0.04);
}

html, body {
  height: 100%;
  overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: 'Syne', sans-serif;
}

.app {
  display: flex;
  height: 100vh;
  position: relative;
}

/* SIDEBAR */
.sidebar {
  width: var(--sidebar);
  background: var(--bg2);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  overflow: hidden;
  transition: transform 0.25s ease, background .2s;
  z-index: 100;
  position: relative;
}

@media (max-width: 700px) {
  .sidebar {
    position: fixed;
    left: 0;
    top: 0;
    bottom: 0;
    transform: translateX(-100%);
    box-shadow: 4px 0 24px rgba(0,0,0,0.4);
    z-index: 1000;
    border-radius: 0 20px 20px 0;
  }
  .sidebar.open {
    transform: translateX(0);
  }
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(4px);
    z-index: 999;
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.2s, visibility 0.2s;
  }
  .overlay.open {
    opacity: 1;
    visibility: visible;
  }
}

.sidebar-header { padding: 18px 16px 14px; border-bottom: 1px solid var(--border); }
.logo { font-size: 18px; font-weight: 700; display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
.logo-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--accent); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

.new-chat-btn {
  width: 100%;
  padding: 12px;
  background: rgba(124,92,252,0.14);
  border: 1px solid rgba(124,92,252,0.35);
  border-radius: 12px;
  color: var(--accent2);
  font-family: 'Syne', sans-serif;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: all .2s;
}
.new-chat-btn:active { transform: scale(0.97); }

.search-wrap { padding: 12px 16px 8px; }
.search-input {
  width: 100%;
  background: var(--input-bg);
  border: 1px solid var(--border2);
  border-radius: 12px;
  padding: 10px 12px 10px 34px;
  font-size: 14px;
  font-family: 'Syne', sans-serif;
  color: var(--text);
  outline: none;
}
.search-input:focus { border-color: rgba(124,92,252,0.6); }
.search-wrap-inner { position: relative; }
.search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 14px; color: var(--muted); }

.chats-label { padding: 12px 16px 8px; font-size: 11px; font-family: 'JetBrains Mono', monospace; color: var(--muted); text-transform: uppercase; }
.chats-list { flex: 1; overflow-y: auto; padding: 4px 12px; }

.chat-item {
  padding: 10px 12px;
  border-radius: 12px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 2px;
}
.chat-item:active { background: rgba(124,92,252,0.12); }
.chat-item.active { background: rgba(124,92,252,0.16); }
.chat-item-icon { font-size: 14px; opacity: 0.6; }
.chat-item-text { flex: 1; font-size: 13px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 500; }
.chat-item.active .chat-item-text { color: var(--accent2); font-weight: 700; }

.chat-actions { display: flex; gap: 6px; }
.chat-rename, .chat-delete {
  background: transparent;
  border: none;
  cursor: pointer;
  font-size: 14px;
  padding: 8px;
  border-radius: 8px;
  min-width: 36px;
  min-height: 36px;
}
.chat-rename { color: rgba(160,160,220,.7); }
.chat-delete { color: rgba(255,100,100,.7); }

.rename-input {
  flex: 1;
  background: rgba(124,92,252,0.12);
  border: 1px solid var(--accent);
  border-radius: 8px;
  color: var(--text);
  padding: 6px 8px;
  font-family: 'Syne', sans-serif;
  font-size: 13px;
  outline: none;
}

.sidebar-footer {
  padding: 12px 16px;
  border-top: 1px solid var(--border);
  font-size: 11px;
  font-family: 'JetBrains Mono', monospace;
  color: var(--muted);
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}

.theme-btn {
  background: none;
  border: 1px solid var(--border2);
  color: var(--muted);
  font-size: 16px;
  width: 36px;
  height: 36px;
  border-radius: 10px;
  cursor: pointer;
  margin-left: auto;
}
.theme-btn:active { border-color: var(--accent); background: rgba(124,92,252,0.15); }

.free-badge { background: rgba(34,197,94,.12); border: 1px solid rgba(34,197,94,.3); color: #4ade80; font-size: 10px; padding: 4px 8px; border-radius: 40px; }

.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--bg); }

.topbar {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--topbar-bg);
  backdrop-filter: blur(16px);
  z-index: 2;
  flex-shrink: 0;
}

.menu-btn {
  display: none;
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: 12px;
  width: 40px;
  height: 40px;
  cursor: pointer;
  font-size: 20px;
  color: var(--text2);
  align-items: center;
  justify-content: center;
}

@media (max-width: 700px) {
  .menu-btn { display: flex; }
}

.topbar-title { font-size: 15px; font-weight: 700; color: var(--text); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.mode-toggle {
  display: flex;
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: 30px;
  padding: 3px;
  gap: 2px;
}

.mode-btn {
  padding: 6px 14px;
  border-radius: 30px;
  border: none;
  background: transparent;
  color: var(--muted);
  font-family: 'Syne', sans-serif;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all .2s;
}
.mode-btn.active { background: var(--accent); color: #fff; }

@media (max-width: 480px) {
  .mode-btn { padding: 5px 12px; font-size: 11px; }
}

.messages-wrap {
  flex: 1;
  overflow-y: auto;
  padding: 16px 0 20px;
  scrollbar-width: thin;
  -webkit-overflow-scrolling: touch;
}

.messages-inner {
  max-width: 760px;
  margin: 0 auto;
  padding: 0 14px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

@media (max-width: 600px) {
  .messages-inner { padding: 0 12px; gap: 14px; }
}

.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 55vh;
  gap: 12px;
  text-align: center;
  color: var(--muted);
}
.empty-glyph { font-size: 48px; background: linear-gradient(135deg,var(--accent),#c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.empty-title { font-size: 22px; font-weight: 700; color: var(--text2); }
.empty-sub { font-size: 13px; font-family: 'JetBrains Mono', monospace; }
.suggestions { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-top: 12px; }
.suggest-btn {
  padding: 8px 16px;
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: 40px;
  color: var(--text2);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: all .2s;
}
.suggest-btn:active { transform: scale(0.96); }

.msg { display: flex; gap: 10px; animation: fadeUp .2s ease; }
.msg.user { flex-direction: row-reverse; }
@keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

.avatar {
  width: 34px;
  height: 34px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 700;
  flex-shrink: 0;
  margin-top: 2px;
}
.avatar.ai { background: rgba(124,92,252,.18); color: var(--accent2); border: 1px solid rgba(124,92,252,.3); }
.avatar.usr { background: var(--bg3); color: var(--text2); border: 1px solid var(--border2); }

.bubble {
  max-width: 80%;
  padding: 10px 14px;
  border-radius: 18px;
  font-size: 14px;
  line-height: 1.55;
  word-break: break-word;
}
.msg.ai .bubble { background: var(--bubble-ai-bg); border: 1px solid var(--bubble-ai-bdr); border-radius: 4px 18px 18px 18px; }
.msg.user .bubble { background: var(--bubble-usr-bg); border: 1px solid var(--bubble-usr-bdr); color: var(--bubble-usr-txt); border-radius: 18px 4px 18px 18px; }

@media (max-width: 600px) {
  .avatar { width: 30px; height: 30px; font-size: 10px; }
  .bubble { max-width: 85%; padding: 8px 12px; font-size: 13px; }
}

.img-msg {
  background: var(--img-frame-bg);
  border: 1px solid var(--border2);
  border-radius: 18px;
  overflow: hidden;
  max-width: 100%;
  width: min(380px, 82vw);
}
.img-msg img { display: block; width: 100%; cursor: pointer; }
.img-msg-label { padding: 8px 12px; font-size: 10px; color: var(--muted); font-family: 'JetBrains Mono', monospace; }
.img-download {
  display: inline-block;
  margin: 0 12px 12px;
  padding: 6px 14px;
  background: rgba(124,92,252,.18);
  border: 1px solid rgba(124,92,252,.4);
  border-radius: 30px;
  color: var(--accent2);
  font-size: 11px;
  font-weight: 600;
  text-decoration: none;
  cursor: pointer;
}
.img-download:active { background: rgba(124,92,252,.3); }

.code-block {
  margin: 8px 0;
  border-radius: 14px;
  overflow: hidden;
  border: 1px solid rgba(255,255,255,.1);
  background: var(--code-bg);
}
.code-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  background: var(--code-hdr);
  border-bottom: 1px solid rgba(255,255,255,.07);
  flex-wrap: wrap;
}
.code-dots { display: flex; gap: 6px; }
.code-dot { width: 10px; height: 10px; border-radius: 50%; }
.code-dot.r{background:#ff5f57} .code-dot.y{background:#febc2e} .code-dot.g{background:#28c840}
.code-lang { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: rgba(255,255,255,.5); flex: 1; text-transform: uppercase; }
.code-btns { display: flex; gap: 8px; }
.code-copy, .code-download {
  background: rgba(255,255,255,.05);
  border: 1px solid rgba(255,255,255,.15);
  color: rgba(255,255,255,.6);
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  padding: 4px 10px;
  border-radius: 30px;
  cursor: pointer;
}
.code-block pre { margin: 0!important; padding: 12px!important; overflow-x: auto; }
.bubble code:not(.hljs) {
  background: var(--inline-code-bg);
  border: 1px solid var(--inline-code-bdr);
  padding: 2px 6px;
  border-radius: 6px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--inline-code-col);
}

.img-gen-opts { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
.img-gen-select {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  background: var(--input-bg);
  border: 1px solid var(--border2);
  color: var(--text);
  padding: 8px 10px;
  border-radius: 40px;
  outline: none;
  cursor: pointer;
}

.typing-wrap { display: flex; gap: 10px; animation: fadeUp .2s ease; }
.typing-bubble {
  background: var(--bubble-ai-bg);
  border: 1px solid var(--bubble-ai-bdr);
  padding: 12px 18px;
  border-radius: 4px 18px 18px 18px;
  display: flex;
  gap: 6px;
}
.dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--accent);
  animation: bounce 1.2s infinite;
}
.dot:nth-child(2){animation-delay:.2s}
.dot:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}

.input-area {
  padding: 8px 12px 18px;
  flex-shrink: 0;
  background: linear-gradient(to top, var(--bg) 70%, transparent);
}
.input-inner { max-width: 760px; margin: 0 auto; display: flex; gap: 10px; align-items: flex-end; }
.input-wrap { flex: 1; background: var(--input-bg); border: 1px solid var(--input-bdr); border-radius: 28px; }
.input-wrap:focus-within { border-color: rgba(124,92,252,.7); }
#user-input {
  width: 100%;
  background: transparent;
  border: none;
  outline: none;
  color: var(--text);
  font-family: 'Syne', sans-serif;
  font-size: 15px;
  padding: 12px 18px;
  resize: none;
  line-height: 1.45;
  max-height: 130px;
}
#send-btn {
  width: 48px;
  height: 48px;
  border-radius: 30px;
  background: var(--accent);
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  color: #fff;
  flex-shrink: 0;
}
#send-btn:active { transform: scale(0.94); }
#send-btn:disabled { background: rgba(124,92,252,.4); }
.input-hint { text-align: center; font-size: 10px; font-family: 'JetBrains Mono', monospace; color: var(--muted); margin-top: 8px; opacity: 0.6; }

.hl { background: rgba(251,191,36,.45); border-radius: 3px; padding: 0 2px; }
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(124,92,252,.35); border-radius: 10px; }
</style>
</head>
<body>

<div class="app">
  <div class="overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo"><div class="logo-dot"></div>AI Chat</div>
      <button class="new-chat-btn" onclick="newChat(); closeSidebar();">+ Новый чат</button>
    </div>
    <div class="search-wrap">
      <div class="search-wrap-inner">
        <span class="search-icon">🔍</span>
        <input class="search-input" id="search-input" type="text" placeholder="Поиск по чатам..." oninput="renderSidebar()">
      </div>
    </div>
    <div class="chats-label">Разговоры</div>
    <div class="chats-list" id="chats-list"></div>
    <div class="sidebar-footer">
      <span>pollinations.ai</span>
      <span class="free-badge">FREE</span>
      <button class="theme-btn" id="theme-btn" onclick="toggleTheme()">🌙</button>
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <button class="menu-btn" id="menu-btn" onclick="toggleSidebar()">☰</button>
      <span class="topbar-title" id="topbar-title">Новый чат</span>
      <div class="mode-toggle">
        <button class="mode-btn active" id="mode-chat" onclick="setMode('chat')">💬 Чат</button>
        <button class="mode-btn" id="mode-image" onclick="setMode('image')">🖼 Картинки</button>
      </div>
    </div>

    <div class="messages-wrap" id="messages-wrap">
      <div class="messages-inner" id="messages"></div>
    </div>

    <div class="input-area">
      <div class="input-inner">
        <div class="input-wrap">
          <textarea id="user-input" rows="1" placeholder="Напиши сообщение..."></textarea>
        </div>
        <button id="send-btn" onclick="handleSend()">➤</button>
      </div>
      <div id="img-opts" style="display:none">
        <div class="img-gen-opts">
          <select class="img-gen-select" id="img-size">
            <option value="1024x1024">1024×1024</option>
            <option value="1280x720">1280×720 (16:9)</option>
            <option value="720x1280">720×1280 (9:16)</option>
            <option value="512x512">512×512</option>
          </select>
          <select class="img-gen-select" id="img-style">
            <option value="">Стиль: любой</option>
            <option value="photorealistic">Фото</option>
            <option value="anime">Аниме</option>
            <option value="oil painting">Масло</option>
            <option value="watercolor">Акварель</option>
            <option value="pixel art">Пиксель</option>
            <option value="3d render">3D</option>
          </select>
        </div>
      </div>
      <div class="input-hint" id="input-hint">Enter — отправить · Shift+Enter — перенос</div>
    </div>
  </main>
</div>

<script>
let chats = JSON.parse(localStorage.getItem('ai_chats') || '[]');
let current = null;
let loading = false;
let mode = 'chat';

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebar-overlay').classList.toggle('open');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('open');
}

const savedTheme = localStorage.getItem('ai_theme') || 'dark';
if (savedTheme === 'light') { document.body.classList.add('light'); document.getElementById('theme-btn').textContent = '☀️'; }

function toggleTheme() {
  const isLight = document.body.classList.toggle('light');
  document.getElementById('theme-btn').textContent = isLight ? '☀️' : '🌙';
  localStorage.setItem('ai_theme', isLight ? 'light' : 'dark');
}

function setMode(m) {
  mode = m;
  document.getElementById('mode-chat').classList.toggle('active', m === 'chat');
  document.getElementById('mode-image').classList.toggle('active', m === 'image');
  document.getElementById('img-opts').style.display = m === 'image' ? 'block' : 'none';
  document.getElementById('user-input').placeholder = m === 'image' ? 'Опиши картинку на английском...' : 'Напиши сообщение...';
  document.getElementById('input-hint').textContent = m === 'image' ? 'Лучше на английском для точности' : 'Enter — отправить · Shift+Enter — перенос';
}

if (chats.length === 0) newChat();
else { loadChat(chats[0].id); renderSidebar(); }

function newChat() {
  const id = 'chat_' + Date.now();
  chats.unshift({ id, title: 'Новый чат', messages: [] });
  save(); loadChat(id); renderSidebar(); closeSidebar();
}

function loadChat(id) {
  current = id;
  const chat = chats.find(c => c.id === id);
  if (!chat) return;
  document.getElementById('topbar-title').textContent = chat.title;
  renderMessages(); renderSidebar(); closeSidebar();
}

function getChat() { return chats.find(c => c.id === current); }

function deleteChat(id, e) {
  e.stopPropagation();
  chats = chats.filter(c => c.id !== id);
  save();
  if (current === id) { chats.length === 0 ? newChat() : loadChat(chats[0].id); }
  else renderSidebar();
}

function save() { localStorage.setItem('ai_chats', JSON.stringify(chats)); }

function uniqueTitle(title, excludeId) {
  const existing = chats.filter(c => c.id !== excludeId).map(c => c.title);
  if (!existing.includes(title)) return title;
  let n = 1;
  while (existing.includes(title + '(' + n + ')')) n++;
  return title + '(' + n + ')';
}

function startRename(id, e) {
  e.stopPropagation();
  const item = e.target.closest('.chat-item');
  const textEl = item.querySelector('.chat-item-text');
  const chat = chats.find(c => c.id === id);
  if (!chat) return;
  const input = document.createElement('input');
  input.type = 'text'; input.value = chat.title; input.className = 'rename-input';
  textEl.replaceWith(input);
  input.focus(); input.select();
  function commit() {
    const val = input.value.trim();
    if (val && val !== chat.title) {
      chat.title = uniqueTitle(val, id);
      if (id === current) document.getElementById('topbar-title').textContent = chat.title;
      save();
    }
    renderSidebar();
  }
  input.addEventListener('blur', commit);
  input.addEventListener('keydown', e2 => {
    if (e2.key === 'Enter') { e2.preventDefault(); input.blur(); }
    if (e2.key === 'Escape') { input.value = chat.title; input.blur(); }
  });
}

function renderSidebar() {
  const query = (document.getElementById('search-input').value || '').toLowerCase().trim();
  const list = document.getElementById('chats-list');
  list.innerHTML = '';
  const filtered = query ? chats.filter(c => c.title.toLowerCase().includes(query)) : chats;
  if (filtered.length === 0) {
    list.innerHTML = '<div style="padding:20px;font-size:12px;color:var(--muted);text-align:center">Ничего не найдено</div>';
    return;
  }
  filtered.forEach(chat => {
    const el = document.createElement('div');
    el.className = 'chat-item' + (chat.id === current ? ' active' : '');
    el.onclick = () => loadChat(chat.id);
    let titleHtml = escapeHtml(chat.title);
    if (query) titleHtml = titleHtml.replace(new RegExp(escapeRegex(query), 'gi'), m => `<span class="hl">${m}</span>`);
    el.innerHTML = `<span class="chat-item-icon">💬</span><span class="chat-item-text">${titleHtml}</span><div class="chat-actions"><button class="chat-rename">✏</button><button class="chat-delete">✕</button></div>`;
    el.querySelector('.chat-rename').onclick = e => startRename(chat.id, e);
    el.querySelector('.chat-delete').onclick = e => deleteChat(chat.id, e);
    list.appendChild(el);
  });
}

function escapeRegex(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }
function escapeHtml(t) { return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function renderMessages() {
  const chat = getChat();
  const el = document.getElementById('messages');
  if (!chat || chat.messages.length === 0) {
    el.innerHTML = `<div class="empty-state"><div class="empty-glyph">✦</div><div class="empty-title">Начни разговор</div><div class="empty-sub">pollinations.ai · без ключа · без лимитов</div><div class="suggestions"><button class="suggest-btn" onclick="quickSend('Напиши Hello World на Python')">🐍 Python</button><button class="suggest-btn" onclick="quickSend('Объясни нейросети простыми словами')">🧠 Нейросети</button><button class="suggest-btn" onclick="quickSend('Напиши сортировку пузырьком на JS')">📊 Сортировка JS</button><button class="suggest-btn" onclick="quickSend('Придумай 5 идей для стартапа')">💡 Идеи</button></div></div>`;
    return;
  }
  el.innerHTML = '';
  chat.messages.forEach(m => appendMsgEl(m.role, m.content, m.type, false));
  scrollBottom();
}

function appendMsgEl(role, content, type, animate) {
  const el = document.getElementById('messages');
  const es = el.querySelector('.empty-state');
  if (es) es.remove();

  if (type === 'image') {
    const wrap = document.createElement('div');
    wrap.className = 'msg ai';
    if (!animate) wrap.style.animation = 'none';
    const av = document.createElement('div'); av.className = 'avatar ai'; av.textContent = 'AI';
    const frame = document.createElement('div'); frame.className = 'img-msg';
    const img = document.createElement('img'); img.src = content; img.alt = 'Generated';
    img.onclick = () => window.open(content, '_blank');
    img.onerror = () => { frame.innerHTML = '<div class="img-msg-label">⚠ Не удалось загрузить</div>'; };
    const label = document.createElement('div'); label.className = 'img-msg-label'; label.textContent = '🖼 Pollinations';
    const dl = document.createElement('a'); dl.className = 'img-download'; dl.href = content; dl.download = 'image.jpg'; dl.target = '_blank'; dl.textContent = '↓ Скачать';
    frame.appendChild(img); frame.appendChild(label); frame.appendChild(dl);
    wrap.appendChild(av); wrap.appendChild(frame);
    el.appendChild(wrap);
    scrollBottom();
    return;
  }

  const wrap = document.createElement('div');
  wrap.className = 'msg ' + (role === 'user' ? 'user' : 'ai');
  if (!animate) wrap.style.animation = 'none';
  const av = document.createElement('div');
  av.className = 'avatar ' + (role === 'user' ? 'usr' : 'ai');
  av.textContent = role === 'user' ? 'Вы' : 'AI';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = role === 'ai' ? formatMessage(content) : escapeHtml(content).replace(/\n/g, '<br>');
  wrap.appendChild(av); wrap.appendChild(bubble);
  el.appendChild(wrap);

  requestAnimationFrame(() => {
    wrap.querySelectorAll('pre code').forEach(b => { if (!b.classList.contains('hljs')) hljs.highlightElement(b); });
  });
  wrap.querySelectorAll('.code-copy').forEach(btn => {
    btn.onclick = () => {
      navigator.clipboard.writeText(btn.closest('.code-block').querySelector('code').innerText).then(() => {
        btn.textContent = '✓'; setTimeout(() => btn.textContent = '⎘', 1500);
      });
    };
  });
  scrollBottom();
}

function formatMessage(text) {
  const blocks = [];
  text = text.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) => {
    const label = lang || 'code';
    const html = `<div class="code-block"><div class="code-header"><div class="code-dots"><div class="code-dot r"></div><div class="code-dot y"></div><div class="code-dot g"></div></div><span class="code-lang">${label}</span><div class="code-btns"><button class="code-copy">⎘</button></div></div><pre><code class="language-${label}">${escapeHtml(code.trim())}</code></pre></div>`;
    blocks.push(html);
    return '\x00B' + (blocks.length - 1) + '\x00';
  });
  text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');
  text = text.replace(/\n/g, '<br>');
  text = text.replace(/\x00B(\d+)\x00/g, (_, i) => blocks[+i]);
  return text;
}

function showTyping() {
  const el = document.getElementById('messages');
  const es = el.querySelector('.empty-state');
  if (es) es.remove();
  const w = document.createElement('div');
  w.className = 'typing-wrap'; w.id = 'typing';
  w.innerHTML = '<div class="avatar ai">AI</div><div class="typing-bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
  el.appendChild(w); scrollBottom();
}
function removeTyping() { const t = document.getElementById('typing'); if (t) t.remove(); }
function scrollBottom() { const w = document.getElementById('messages-wrap'); setTimeout(() => w.scrollTop = w.scrollHeight, 30); }

function handleSend() { if (mode === 'image') generateImage(); else sendMessage(); }

async function sendMessage() {
  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if (!text || loading) return;
  const chat = getChat(); if (!chat) return;
  loading = true;
  document.getElementById('send-btn').disabled = true;
  input.value = ''; input.style.height = 'auto';
  chat.messages.push({ role: 'user', content: text });
  if (chat.messages.length === 1) {
    chat.title = text.slice(0, 40) + (text.length > 40 ? '…' : '');
    document.getElementById('topbar-title').textContent = chat.title;
  }
  save(); appendMsgEl('user', text, null, true); showTyping(); renderSidebar();
  try {
    const systemPrompt = { role: 'system', content: 'You are a helpful assistant. Always write COMPLETE code — no truncation, no placeholders like "...". Finish what you start.' };
    const msgs = [systemPrompt, ...chat.messages.map(m => ({ role: m.role === 'ai' ? 'assistant' : m.role, content: m.content }))];
    const resp = await fetch('https://text.pollinations.ai/openai', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: 'openai', messages: msgs, max_tokens: 4096, seed: Math.floor(Math.random() * 99999) })
    });
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();
    let reply = data.choices?.[0]?.message?.content || 'Нет ответа';
    let finishReason = data.choices?.[0]?.finish_reason;
    let attempts = 0;
    while (finishReason === 'length' && attempts < 4) {
      attempts++;
      const continueMessages = [...msgs, { role: 'assistant', content: reply }, { role: 'user', content: 'Continue exactly where you left off.' }];
      const r2 = await fetch('https://text.pollinations.ai/openai', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ model: 'openai', messages: continueMessages, max_tokens: 4096, seed: Math.floor(Math.random() * 99999) })
      });
      if (!r2.ok) break;
      const d2 = await r2.json();
      reply += d2.choices?.[0]?.message?.content || '';
      finishReason = d2.choices?.[0]?.finish_reason;
    }
    removeTyping();
    chat.messages.push({ role: 'ai', content: reply });
    save(); appendMsgEl('ai', reply, null, true);
  } catch (e) {
    removeTyping();
    const err = '⚠ Ошибка: ' + e.message;
    chat.messages.push({ role: 'ai', content: err });
    save(); appendMsgEl('ai', err, null, true);
  }
  loading = false;
  document.getElementById('send-btn').disabled = false;
  input.focus();
}

async function generateImage() {
  const input = document.getElementById('user-input');
  const prompt = input.value.trim();
  if (!prompt || loading) return;
  const chat = getChat(); if (!chat) return;
  const size = document.getElementById('img-size').value;
  const style = document.getElementById('img-style').value;
  const [w, h] = size.split('x');
  const fullPrompt = style ? prompt + ', ' + style : prompt;
  const url = `https://image.pollinations.ai/prompt/${encodeURIComponent(fullPrompt)}?width=${w}&height=${h}&seed=${Math.floor(Math.random() * 999999)}&nologo=true`;
  loading = true;
  document.getElementById('send-btn').disabled = true;
  input.value = ''; input.style.height = 'auto';
  chat.messages.push({ role: 'user', content: prompt });
  if (chat.messages.length === 1) {
    chat.title = '🖼 ' + prompt.slice(0, 35) + (prompt.length > 35 ? '…' : '');
    document.getElementById('topbar-title').textContent = chat.title;
  }
  save(); appendMsgEl('user', prompt, null, true); showTyping(); renderSidebar();
  await new Promise(resolve => { const img = new Image(); img.onload = resolve; img.onerror = resolve; img.src = url; setTimeout(resolve, 15000); });
  removeTyping();
  chat.messages.push({ role: 'ai', content: url, type: 'image' });
  save(); appendMsgEl('ai', url, 'image', true);
  loading = false;
  document.getElementById('send-btn').disabled = false;
  input.focus();
}

function quickSend(text) { document.getElementById('user-input').value = text; sendMessage(); }

const inputEl = document.getElementById('user-input');
inputEl.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); } });
inputEl.addEventListener('input', () => { inputEl.style.height = 'auto'; inputEl.style.height = Math.min(inputEl.scrollHeight, 130) + 'px'; });
</script>
