<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0d0d14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AI Chat">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>AI Chat — Pollinations</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

/* ── DARK THEME (default) ── */
:root {
  --bg:       #0d0d14;
  --bg2:      #13131e;
  --bg3:      #1a1a28;
  --border:   rgba(255,255,255,0.07);
  --border2:  rgba(255,255,255,0.13);
  --accent:   #7c5cfc;
  --accent2:  #a78bfa;
  --text:     rgba(255,255,255,0.88);
  --text2:    rgba(255,255,255,0.55);
  --muted:    rgba(255,255,255,0.30);
  --bubble-ai-bg:   rgba(255,255,255,0.04);
  --bubble-ai-bdr:  rgba(255,255,255,0.08);
  --bubble-usr-bg:  rgba(124,92,252,0.18);
  --bubble-usr-bdr: rgba(124,92,252,0.35);
  --bubble-usr-txt: #e4ddff;
  --input-bg:  rgba(255,255,255,0.05);
  --input-bdr: rgba(255,255,255,0.12);
  --topbar-bg: rgba(13,13,20,0.85);
  --code-bg:   #161622;
  --code-hdr:  rgba(255,255,255,0.05);
  --inline-code-bg:  rgba(124,92,252,0.18);
  --inline-code-bdr: rgba(124,92,252,0.28);
  --inline-code-col: #a78bfa;
  --img-frame-bg: rgba(255,255,255,0.04);
  --sidebar: 280px;
}

/* ── LIGHT THEME ── */
body.light {
  --bg:       #f4f4f8;
  --bg2:      #ffffff;
  --bg3:      #eaeaf0;
  --border:   rgba(0,0,0,0.08);
  --border2:  rgba(0,0,0,0.14);
  --accent:   #6c47f5;
  --accent2:  #5535d4;
  --text:     #1a1a2e;
  --text2:    #5a5a7a;
  --muted:    #9898b8;
  --bubble-ai-bg:   #ffffff;
  --bubble-ai-bdr:  rgba(0,0,0,0.08);
  --bubble-usr-bg:  rgba(108,71,245,0.10);
  --bubble-usr-bdr: rgba(108,71,245,0.25);
  --bubble-usr-txt: #2d1a7a;
  --input-bg:  #ffffff;
  --input-bdr: rgba(0,0,0,0.14);
  --topbar-bg: rgba(244,244,248,0.92);
  --code-bg:   #1e1e2e;
  --code-hdr:  rgba(0,0,0,0.5);
  --inline-code-bg:  rgba(108,71,245,0.10);
  --inline-code-bdr: rgba(108,71,245,0.22);
  --inline-code-col: #5535d4;
  --img-frame-bg: rgba(0,0,0,0.04);
}

html, body { height:100%; overflow:hidden; background:var(--bg); color:var(--text); font-family:'Syne',sans-serif; transition: background .25s, color .25s; }

/* ── LAYOUT ── */
.app { display:flex; height:100vh; position:relative; }

/* ── SIDEBAR (выезжающая на мобилках) ── */
.sidebar { 
  width:var(--sidebar); 
  background:var(--bg2); 
  border-right:1px solid var(--border); 
  display:flex; 
  flex-direction:column; 
  flex-shrink:0; 
  overflow:hidden; 
  transition:transform .3s cubic-bezier(0.2, 0.9, 0.4, 1.1), background .25s;
  z-index: 100;
  position: relative;
}

/* На мобилках sidebar скрыт за экраном */
@media (max-width: 700px) {
  .sidebar {
    position: fixed;
    left: 0;
    top: 0;
    bottom: 0;
    transform: translateX(-100%);
    box-shadow: 2px 0 20px rgba(0,0,0,0.3);
    z-index: 1000;
  }
  .sidebar.open {
    transform: translateX(0);
  }
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(3px);
    z-index: 999;
    opacity: 0;
    visibility: hidden;
    transition: opacity .2s, visibility .2s;
  }
  .overlay.open {
    opacity: 1;
    visibility: visible;
  }
}

.sidebar-header { padding:16px 14px 12px; border-bottom:1px solid var(--border); }

.logo { font-size:16px; font-weight:700; color:var(--text); display:flex; align-items:center; gap:8px; margin-bottom:12px; }

.logo-dot { width:9px; height:9px; border-radius:50%; background:var(--accent); box-shadow:0 0 8px var(--accent); animation:pulse 2s infinite; }

@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

.new-chat-btn { width:100%; padding:9px 12px; background:rgba(124,92,252,0.12); border:1px solid rgba(124,92,252,0.28); border-radius:10px; color:var(--accent2); font-family:'Syne',sans-serif; font-size:13px; font-weight:600; cursor:pointer; display:flex; align-items:center; gap:7px; transition:all .2s; }
.new-chat-btn:hover { background:rgba(124,92,252,0.22); }
.new-chat-btn:active { transform:scale(.98); }

.search-wrap { padding:8px 14px 4px; }
.search-input { width:100%; background:var(--input-bg); border:1px solid var(--border2); border-radius:8px; color:var(--text); font-family:'Syne',sans-serif; font-size:12px; padding:7px 10px 7px 30px; outline:none; transition:border-color .2s; }
.search-input::placeholder { color:var(--muted); }
.search-input:focus { border-color:rgba(124,92,252,.45); }
.search-wrap-inner { position:relative; }
.search-icon { position:absolute; left:9px; top:50%; transform:translateY(-50%); font-size:13px; color:var(--muted); pointer-events:none; }

.chats-label { padding:10px 14px 4px; font-size:10px; font-family:'JetBrains Mono',monospace; color:var(--muted); letter-spacing:.1em; text-transform:uppercase; }

.chats-list { flex:1; overflow-y:auto; padding:4px 8px; scrollbar-width:thin; scrollbar-color:rgba(124,92,252,.2) transparent; }

.chat-item { padding:8px 10px; border-radius:8px; cursor:pointer; display:flex; align-items:center; gap:8px; transition:background .15s; position:relative; touch-action: manipulation; }
.chat-item:hover { background:rgba(124,92,252,0.08); }
.chat-item.active { background:rgba(124,92,252,0.14); }
.chat-item-icon { font-size:13px; opacity:.45; flex-shrink:0; }
.chat-item-text { flex:1; font-size:12.5px; color:var(--text2); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.chat-item.active .chat-item-text { color:var(--accent2); font-weight:600; }

.chat-actions { display:flex; gap:2px; opacity:0; transition:opacity .15s; flex-shrink:0; }
@media (max-width: 700px) {
  .chat-actions { opacity:1; }
}
.chat-item:hover .chat-actions { opacity:1; }

.chat-rename, .chat-delete { background:none; border:none; cursor:pointer; font-size:13px; padding:6px 8px; border-radius:4px; transition:color .15s; touch-action: manipulation; min-width:32px; min-height:32px; }
.chat-rename { color:rgba(160,160,220,.6); }
.chat-rename:hover { color:var(--accent2); }
.chat-delete { color:rgba(255,80,80,.5); }
.chat-delete:hover { color:rgba(255,80,80,.9); }

.rename-input { flex:1; background:rgba(255,255,255,.08); border:1px solid rgba(124,92,252,.5); border-radius:5px; color:var(--text); font-family:'Syne',sans-serif; font-size:12.5px; padding:4px 6px; outline:none; width:100%; min-width:0; }

.sidebar-footer { padding:10px 14px; border-top:1px solid var(--border); font-size:11px; font-family:'JetBrains Mono',monospace; color:var(--muted); display:flex; align-items:center; gap:6px; flex-wrap:wrap; }

/* theme toggle */
.theme-btn { background:none; border:1px solid var(--border2); color:var(--muted); font-size:14px; width:32px; height:32px; border-radius:7px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .2s; margin-left:auto; touch-action: manipulation; }
.theme-btn:hover { border-color:var(--accent); color:var(--accent2); }

.free-badge { background:rgba(34,197,94,.12); border:1px solid rgba(34,197,94,.25); color:#4ade80; font-size:10px; padding:2px 7px; border-radius:20px; }

/* ── MAIN ── */
.main { flex:1; display:flex; flex-direction:column; overflow:hidden; position:relative; }
.main::before { content:''; position:absolute; top:-100px; right:-100px; width:400px; height:400px; background:radial-gradient(circle, rgba(124,92,252,.07) 0%, transparent 70%); pointer-events:none; z-index:0; }

/* ── TOPBAR ── */
.topbar { padding:13px 16px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:12px; background:var(--topbar-bg); backdrop-filter:blur(12px); z-index:1; flex-shrink:0; transition:background .25s; }
.menu-btn {
  display: none;
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: 8px;
  width: 36px;
  height: 36px;
  cursor: pointer;
  font-size: 18px;
  color: var(--text2);
  align-items: center;
  justify-content: center;
  touch-action: manipulation;
  flex-shrink: 0;
}
@media (max-width: 700px) {
  .menu-btn { display: flex; }
}
.topbar-title { font-size:14px; font-weight:600; color:var(--text2); flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

/* image mode toggle */
.mode-toggle { display:flex; background:var(--bg3); border:1px solid var(--border2); border-radius:9px; padding:3px; gap:2px; flex-shrink:0; }
.mode-btn { padding:5px 12px; border-radius:6px; border:none; background:transparent; color:var(--muted); font-family:'Syne',sans-serif; font-size:12px; cursor:pointer; transition:all .2s; white-space:nowrap; touch-action: manipulation; }
.mode-btn.active { background:var(--accent); color:#fff; }
@media (max-width: 480px) {
  .mode-btn { padding:5px 8px; font-size:11px; }
}

/* PWA Install Button */
.install-pwa-btn {
  background: linear-gradient(135deg, var(--accent), #a855f7);
  border: none;
  color: white;
  font-family: 'Syne', sans-serif;
  font-size: 12px;
  font-weight: 600;
  padding: 6px 12px;
  border-radius: 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: transform 0.2s, opacity 0.2s;
  margin-right: 8px;
  white-space: nowrap;
}
.install-pwa-btn:active { transform: scale(0.96); }
.install-pwa-btn.hidden { display: none; }

/* ── MESSAGES ── */
.messages-wrap { flex:1; overflow-y:auto; padding:16px 0; scrollbar-width:thin; scrollbar-color:rgba(124,92,252,.2) transparent; z-index:1; -webkit-overflow-scrolling: touch; }
.messages-inner { max-width:780px; margin:0 auto; padding:0 16px; display:flex; flex-direction:column; gap:16px; }
@media (max-width: 600px) {
  .messages-inner { padding:0 12px; gap:14px; }
}

/* ── EMPTY STATE ── */
.empty-state { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:58vh; gap:10px; color:var(--muted); text-align:center; }
.empty-glyph { font-size:44px; background:linear-gradient(135deg,var(--accent),#c084fc); -webkit-background-clip:text; -webkit-text-fill-color:transparent; opacity:.65; }
.empty-title { font-size:20px; font-weight:700; color:var(--text2); }
.empty-sub { font-size:12px; font-family:'JetBrains Mono',monospace; color:var(--muted); text-align:center; }
.suggestions { display:flex; flex-wrap:wrap; gap:7px; justify-content:center; margin-top:6px; }
.suggest-btn { padding:8px 14px; background:var(--bg2); border:1px solid var(--border2); border-radius:20px; color:var(--text2); font-family:'Syne',sans-serif; font-size:12px; cursor:pointer; transition:all .2s; touch-action: manipulation; }
.suggest-btn:active { transform:scale(.96); }

/* ── MSG ROWS ── */
.msg { display:flex; gap:10px; animation:fadeUp .25s ease; }
.msg.user { flex-direction:row-reverse; }
@keyframes fadeUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

.avatar { width:32px; height:32px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:700; flex-shrink:0; margin-top:2px; }
.avatar.ai  { background:rgba(124,92,252,.18); color:var(--accent2); border:1px solid rgba(124,92,252,.28); }
.avatar.usr { background:var(--bg3); color:var(--text2); border:1px solid var(--border2); }

.bubble { max-width:78%; padding:10px 14px; border-radius:14px; font-size:14px; line-height:1.6; word-break:break-word; }
.msg.ai   .bubble { background:var(--bubble-ai-bg); border:1px solid var(--bubble-ai-bdr); color:var(--text); border-radius:4px 14px 14px 14px; }
.msg.user .bubble { background:var(--bubble-usr-bg); border:1px solid var(--bubble-usr-bdr); color:var(--bubble-usr-txt); border-radius:14px 4px 14px 14px; }

@media (max-width: 600px) {
  .avatar { width:28px; height:28px; font-size:9px; }
  .bubble { max-width:85%; padding:8px 12px; font-size:13px; line-height:1.55; }
}

/* ── IMAGE MSG ── */
.img-msg { background:var(--img-frame-bg); border:1px solid var(--border2); border-radius:14px; overflow:hidden; max-width:100%; width:min(400px, 85vw); }
.img-msg img { display:block; width:100%; border-radius:13px; cursor:pointer; }
.img-msg-label { padding:6px 10px; font-size:11px; color:var(--muted); font-family:'JetBrains Mono',monospace; }
.img-download { display:inline-block; margin:0 10px 10px; padding:5px 12px; background:rgba(124,92,252,.15); border:1px solid rgba(124,92,252,.3); border-radius:7px; color:var(--accent2); font-size:11px; text-decoration:none; cursor:pointer; transition:background .2s; touch-action: manipulation; }
.img-download:active { background:rgba(124,92,252,.3); }

/* ── CODE BLOCKS ── */
.code-block { margin:8px 0; border-radius:10px; overflow:hidden; border:1px solid rgba(255,255,255,.1); background:var(--code-bg); }
.code-header { display:flex; align-items:center; gap:8px; padding:6px 12px; background:var(--code-hdr); border-bottom:1px solid rgba(255,255,255,.07); flex-wrap:wrap; }
.code-dots { display:flex; gap:5px; }
.code-dot { width:10px; height:10px; border-radius:50%; }
.code-dot.r{background:#ff5f57} .code-dot.y{background:#febc2e} .code-dot.g{background:#28c840}
.code-lang { font-family:'JetBrains Mono',monospace; font-size:10px; color:rgba(255,255,255,.4); letter-spacing:.06em; flex:1; }
.code-btns { display:flex; gap:6px; align-items:center; }
.code-copy, .code-download { background:none; border:1px solid rgba(255,255,255,.12); color:rgba(255,255,255,.4); font-family:'JetBrains Mono',monospace; font-size:10px; padding:3px 8px; border-radius:5px; cursor:pointer; transition:all .2s; touch-action: manipulation; }
.code-copy:active, .code-download:active { background:rgba(255,255,255,.1); }
.code-block pre { margin:0!important; border-radius:0!important; background:transparent!important; padding:12px!important; overflow-x:auto; font-size:12px!important; line-height:1.55!important; }
.code-block code { font-family:'JetBrains Mono',monospace!important; }
.bubble code:not(.hljs) { background:var(--inline-code-bg); border:1px solid var(--inline-code-bdr); padding:1px 5px; border-radius:4px; font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--inline-code-col); }

/* ── IMAGE GEN INPUT ── */
.img-gen-bar { display:flex; flex-direction:column; gap:6px; }
.img-gen-opts { display:flex; gap:8px; flex-wrap:wrap; }
.img-gen-select { font-family:'JetBrains Mono',monospace; font-size:11px; background:var(--input-bg); border:1px solid var(--border2); color:var(--text); padding:6px 8px; border-radius:8px; outline:none; cursor:pointer; touch-action: manipulation; }

/* ── TYPING ── */
.typing-wrap { display:flex; gap:10px; animation:fadeUp .25s ease; }
.typing-bubble { background:var(--bubble-ai-bg); border:1px solid var(--bubble-ai-bdr); padding:12px 16px; border-radius:4px 14px 14px 14px; display:flex; gap:5px; align-items:center; }
.dot { width:6px; height:6px; border-radius:50%; background:var(--accent); animation:bounce 1.2s infinite; }
.dot:nth-child(2){animation-delay:.2s} .dot:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}

/* ── INPUT AREA ── */
.input-area { padding:12px 16px 16px; z-index:1; flex-shrink:0; background:linear-gradient(to top, var(--bg) 80%, transparent); }
.input-inner { max-width:780px; margin:0 auto; display:flex; gap:9px; align-items:flex-end; }
.input-wrap { flex:1; background:var(--input-bg); border:1px solid var(--input-bdr); border-radius:20px; transition:border-color .2s; }
.input-wrap:focus-within { border-color:rgba(124,92,252,.5); box-shadow:0 0 0 3px rgba(124,92,252,.07); }
#user-input { width:100%; background:transparent; border:none; outline:none; color:var(--text); font-family:'Syne',sans-serif; font-size:14px; padding:11px 15px; resize:none; line-height:1.5; max-height:120px; overflow-y:auto; }
#user-input::placeholder { color:var(--muted); }
#send-btn { width:44px; height:44px; border-radius:22px; background:var(--accent); border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:background .2s,transform .1s; flex-shrink:0; font-size:16px; color:#fff; touch-action: manipulation; }
#send-btn:active { transform:scale(.94); }
#send-btn:disabled { background:rgba(124,92,252,.3); cursor:not-allowed; transform:none; }
.input-hint { text-align:center; font-size:10px; font-family:'JetBrains Mono',monospace; color:var(--muted); margin-top:6px; opacity:.6; }

/* search highlight */
.hl { background:rgba(251,191,36,.35); border-radius:2px; }

::-webkit-scrollbar { width:4px; height:4px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:rgba(124,92,252,.25); border-radius:3px; }

.overlay { transition: opacity 0.2s ease, visibility 0.2s ease; }
</style>
</head>
<body>

<div class="app">
  <div class="overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo"><div class="logo-dot"></div>AI Chat</div>
      <button class="new-chat-btn" onclick="newChat(); closeSidebar();">
        <span style="font-size:15px">＋</span> Новый чат
      </button>
    </div>

    <div class="search-wrap">
      <div class="search-wrap-inner">
        <span class="search-icon">🔍</span>
        <input class="search-input" id="search-input" type="text" placeholder="Поиск по чатам..." oninput="renderSidebar()">
      </div>
    </div>

    <div class="chats-label">Разговоры</div>
    <div class="chats-list" id="chats-list"></div>

    <div class="sidebar-footer">
      <span>pollinations.ai</span>
      <span class="free-badge">FREE</span>
      <button class="theme-btn" id="theme-btn" onclick="toggleTheme()" title="Сменить тему">🌙</button>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="topbar">
      <button class="menu-btn" id="menu-btn" onclick="toggleSidebar()" title="Меню">☰</button>
      <span class="topbar-title" id="topbar-title">Новый чат</span>
      <button class="install-pwa-btn hidden" id="install-btn" onclick="installPWA()">
        📲 Установить
      </button>
      <div class="mode-toggle">
        <button class="mode-btn active" id="mode-chat" onclick="setMode('chat')">💬 Чат</button>
        <button class="mode-btn" id="mode-image" onclick="setMode('image')">🖼 Картинки</button>
      </div>
    </div>

    <div class="messages-wrap" id="messages-wrap">
      <div class="messages-inner" id="messages"></div>
    </div>

    <div class="input-area">
      <div class="input-inner">
        <div class="input-wrap">
          <textarea id="user-input" rows="1" placeholder="Напиши сообщение..."></textarea>
        </div>
        <button id="send-btn" onclick="handleSend()" title="Отправить">➤</button>
      </div>
      <!-- image options, hidden in chat mode -->
      <div class="input-inner" id="img-opts" style="display:none; margin-top:8px;">
        <div class="img-gen-opts">
          <select class="img-gen-select" id="img-size">
            <option value="1024x1024">1024×1024</option>
            <option value="1280x720">1280×720 (16:9)</option>
            <option value="720x1280">720×1280 (9:16)</option>
            <option value="512x512">512×512</option>
          </select>
          <select class="img-gen-select" id="img-style">
            <option value="">Стиль: любой</option>
            <option value="photorealistic">Фото</option>
            <option value="anime">Аниме</option>
            <option value="oil painting">Масло</option>
            <option value="watercolor">Акварель</option>
            <option value="pixel art">Пиксель</option>
            <option value="3d render">3D рендер</option>
          </select>
        </div>
      </div>
      <div class="input-hint" id="input-hint">Enter — отправить · Shift+Enter — перенос</div>
    </div>
  </main>
</div>

<script>
// ── PWA INSTALL ──
let deferredPrompt = null;
const installBtn = document.getElementById('install-btn');

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  installBtn.classList.remove('hidden');
});

function installPWA() {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then((choiceResult) => {
    if (choiceResult.outcome === 'accepted') {
      console.log('Пользователь установил PWA');
    }
    deferredPrompt = null;
    installBtn.classList.add('hidden');
  });
}

// ── STATE ──
let chats   = JSON.parse(localStorage.getItem('ai_chats') || '[]');
let current = null;
let loading = false;
let mode    = 'chat';

// sidebar mobile
function toggleSidebar() {
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebar-overlay');
  sidebar.classList.toggle('open');
  overlay.classList.toggle('open');
}
function closeSidebar() {
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebar-overlay');
  sidebar.classList.remove('open');
  overlay.classList.remove('open');
}

// theme
const savedTheme = localStorage.getItem('ai_theme') || 'dark';
if (savedTheme === 'light') { document.body.classList.add('light'); document.getElementById('theme-btn').textContent = '☀️'; }

function toggleTheme() {
  const isLight = document.body.classList.toggle('light');
  document.getElementById('theme-btn').textContent = isLight ? '☀️' : '🌙';
  localStorage.setItem('ai_theme', isLight ? 'light' : 'dark');
}

function setMode(m) {
  mode = m;
  document.getElementById('mode-chat').classList.toggle('active', m === 'chat');
  document.getElementById('mode-image').classList.toggle('active', m === 'image');
  document.getElementById('img-opts').style.display = m === 'image' ? 'flex' : 'none';
  document.getElementById('user-input').placeholder = m === 'image'
    ? 'Опиши картинку на английском...'
    : 'Напиши сообщение...';
  document.getElementById('input-hint').textContent = m === 'image'
    ? 'Описание лучше на английском для точного результата'
    : 'Enter — отправить · Shift+Enter — перенос';
}

// ── INIT ──
if (chats.length === 0) newChat();
else { loadChat(chats[0].id); renderSidebar(); }

// ── CHAT MANAGEMENT ──
function newChat() {
  const id = 'chat_' + Date.now();
  chats.unshift({ id, title: 'Новый чат', messages: [] });
  save(); loadChat(id); renderSidebar();
  closeSidebar();
}

function loadChat(id) {
  current = id;
  const chat = getChat();
  if (!chat) return;
  document.getElementById('topbar-title').textContent = chat.title;
  renderMessages(); renderSidebar();
  closeSidebar();
}

function getChat() { return chats.find(c => c.id === current); }

function deleteChat(id, e) {
  e.stopPropagation();
  chats = chats.filter(c => c.id !== id);
  save();
  if (current === id) { chats.length === 0 ? newChat() : loadChat(chats[0].id); }
  else renderSidebar();
}

function save() { localStorage.setItem('ai_chats', JSON.stringify(chats)); }

function uniqueTitle(title, excludeId) {
  const existing = chats.filter(c => c.id !== excludeId).map(c => c.title);
  if (!existing.includes(title)) return title;
  let n = 1;
  while (existing.includes(title + '(' + n + ')')) n++;
  return title + '(' + n + ')';
}

function startRename(id, e) {
  e.stopPropagation();
  const item   = e.target.closest('.chat-item');
  const textEl = item.querySelector('.chat-item-text');
  const chat   = chats.find(c => c.id === id);
  if (!chat) return;
  const input  = document.createElement('input');
  input.type = 'text'; input.value = chat.title; input.className = 'rename-input';
  textEl.replaceWith(input);
  input.focus(); input.select();
  function commit() {
    const val = input.value.trim();
    if (val && val !== chat.title) {
      chat.title = uniqueTitle(val, id);
      if (id === current) document.getElementById('topbar-title').textContent = chat.title;
      save();
    }
    renderSidebar();
  }
  input.addEventListener('blur', commit);
  input.addEventListener('keydown', e2 => {
    if (e2.key === 'Enter')  { e2.preventDefault(); input.blur(); }
    if (e2.key === 'Escape') { input.value = chat.title; input.blur(); }
  });
}

function renderSidebar() {
  const query = (document.getElementById('search-input').value || '').toLowerCase().trim();
  const list  = document.getElementById('chats-list');
  list.innerHTML = '';
  const filtered = query ? chats.filter(c => c.title.toLowerCase().includes(query)) : chats;
  if (filtered.length === 0) {
    list.innerHTML = '<div style="padding:20px 14px; font-size:12px; color:var(--muted); text-align:center">Ничего не найдено</div>';
    return;
  }
  filtered.forEach(chat => {
    const el = document.createElement('div');
    el.className = 'chat-item' + (chat.id === current ? ' active' : '');
    el.onclick = () => loadChat(chat.id);
    const titleHtml = query
      ? escHtml(chat.title).replace(new RegExp(escRegex(escHtml(query)), 'gi'), m => `<span class="hl">${m}</span>`)
      : escHtml(chat.title);
    el.innerHTML = `
      <span class="chat-item-icon">💬</span>
      <span class="chat-item-text">${titleHtml}</span>
      <div class="chat-actions">
        <button class="chat-rename" title="Переименовать">✏</button>
        <button class="chat-delete" title="Удалить">✕</button>
      </div>`;
    el.querySelector('.chat-rename').onclick = e => startRename(chat.id, e);
    el.querySelector('.chat-delete').onclick = e => deleteChat(chat.id, e);
    list.appendChild(el);
  });
}

function escRegex(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

function renderMessages() {
  const chat = getChat();
  const el   = document.getElementById('messages');
  if (!chat || chat.messages.length === 0) {
    el.innerHTML = `
      <div class="empty-state">
        <div class="empty-glyph">✦</div>
        <div class="empty-title">Начни разговор</div>
        <div class="empty-sub">pollinations.ai · без ключа · без лимитов</div>
        <div class="suggestions">
          <button class="suggest-btn" onclick="quickSend('Напиши Hello World на Python')">🐍 Python Hello World</button>
          <button class="suggest-btn" onclick="quickSend('Объясни нейросети простыми словами')">🧠 Что такое нейросети?</button>
          <button class="suggest-btn" onclick="quickSend('Напиши сортировку пузырьком на JavaScript')">📊 Сортировка на JS</button>
          <button class="suggest-btn" onclick="quickSend('Придумай 5 идей для стартапа')">💡 Идеи для стартапа</button>
        </div>
      </div>`;
    return;
  }
  el.innerHTML = '';
  chat.messages.forEach(m => appendMsgEl(m.role, m.content, m.type, false));
  scrollBottom();
}

function appendMsgEl(role, content, type, animate) {
  const el = document.getElementById('messages');
  const es = el.querySelector('.empty-state');
  if (es) es.remove();

  if (type === 'image') {
    const wrap = document.createElement('div');
    wrap.className = 'msg ai';
    if (!animate) wrap.style.animation = 'none';
    const av = document.createElement('div');
    av.className = 'avatar ai'; av.textContent = 'AI';
    const frame = document.createElement('div');
    frame.className = 'img-msg';
    const img = document.createElement('img');
    img.src = content; img.alt = 'Generated image';
    img.onclick = () => window.open(content, '_blank');
    img.onerror = () => { frame.innerHTML = '<div class="img-msg-label">⚠ Не удалось загрузить изображение</div>'; };
    const label = document.createElement('div');
    label.className = 'img-msg-label'; label.textContent = '🖼 Сгенерировано Pollinations';
    const dl = document.createElement('a');
    dl.className = 'img-download'; dl.href = content; dl.download = 'image.jpg'; dl.target = '_blank'; dl.textContent = '↓ Скачать';
    frame.appendChild(img); frame.appendChild(label); frame.appendChild(dl);
    wrap.appendChild(av); wrap.appendChild(frame);
    el.appendChild(wrap);
    scrollBottom();
    return;
  }

  const wrap = document.createElement('div');
  wrap.className = 'msg ' + (role === 'user' ? 'user' : 'ai');
  if (!animate) wrap.style.animation = 'none';
  const av = document.createElement('div');
  av.className = 'avatar ' + (role === 'user' ? 'usr' : 'ai');
  av.textContent = role === 'user' ? 'Вы' : 'AI';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = role === 'ai' ? formatMessage(content) : escHtml(content).replace(/\n/g,'<br>');
  wrap.appendChild(av); wrap.appendChild(bubble);
  el.appendChild(wrap);

  requestAnimationFrame(() => {
    wrap.querySelectorAll('pre code').forEach(b => {
      if (!b.classList.contains('hljs')) hljs.highlightElement(b);
    });
  });
  wrap.querySelectorAll('.code-copy').forEach(btn => {
    btn.onclick = () => {
      navigator.clipboard.writeText(btn.closest('.code-block').querySelector('code').innerText).then(() => {
        btn.textContent = '✓ скопировано';
        setTimeout(() => btn.textContent = '⎘ копировать', 1800);
      });
    };
  });
  wrap.querySelectorAll('.code-download').forEach(btn => {
    btn.onclick = () => {
      const block = btn.closest('.code-block');
      const code  = block.querySelector('code').innerText;
      const lang  = block.querySelector('.code-lang').textContent.trim();
      const blob  = new Blob([code], {type:'text/plain'});
      const url   = URL.createObjectURL(blob);
      const a     = document.createElement('a');
      a.href = url; a.download = 'code.' + langToExt(lang); a.click();
      URL.revokeObjectURL(url);
      btn.textContent = '✓ скачано';
      setTimeout(() => btn.textContent = '↓ скачать', 1800);
    };
  });
  scrollBottom();
}

function formatMessage(text) {
  const blocks = [];
  text = text.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) => {
    const label = lang || 'code';
    const html  = `<div class="code-block">
      <div class="code-header">
        <div class="code-dots"><div class="code-dot r"></div><div class="code-dot y"></div><div class="code-dot g"></div></div>
        <span class="code-lang">${label}</span>
        <div class="code-btns">
          <button class="code-copy">⎘ копировать</button>
          <button class="code-download">↓ скачать</button>
        </div>
      </div>
      <pre><code class="language-${label}">${escHtml(code.trim())}</code></pre>
    </div>`;
    blocks.push(html);
    return '\x00B' + (blocks.length-1) + '\x00';
  });
  text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');
  text = text.replace(/\n/g, '<br>');
  text = text.replace(/\x00B(\d+)\x00/g, (_, i) => blocks[+i]);
  return text;
}

function escHtml(t) { return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function langToExt(lang) {
  const m = {python:'py',javascript:'js',typescript:'ts',html:'html',css:'css',java:'java',cpp:'cpp',c:'c',cs:'cs',go:'go',rust:'rs',php:'php',ruby:'rb',swift:'swift',kotlin:'kt',bash:'sh',shell:'sh',sql:'sql',json:'json',xml:'xml',yaml:'yml',markdown:'md',lua:'lua',dart:'dart',scala:'scala',perl:'pl'};
  return m[(lang||'').toLowerCase()] || 'txt';
}

function showTyping() {
  const el = document.getElementById('messages');
  const es = el.querySelector('.empty-state'); if (es) es.remove();
  const w  = document.createElement('div');
  w.className = 'typing-wrap'; w.id = 'typing';
  w.innerHTML = '<div class="avatar ai">AI</div><div class="typing-bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
  el.appendChild(w); scrollBottom();
}
function removeTyping() { const t = document.getElementById('typing'); if(t) t.remove(); }
function scrollBottom() { const w = document.getElementById('messages-wrap'); setTimeout(()=>w.scrollTop=w.scrollHeight,30); }

function handleSend() {
  if (mode === 'image') generateImage();
  else sendMessage();
}

async function sendMessage() {
  const input = document.getElementById('user-input');
  const text  = input.value.trim();
  if (!text || loading) return;
  const chat = getChat(); if (!chat) return;

  loading = true;
  document.getElementById('send-btn').disabled = true;
  input.value = ''; input.style.height = 'auto';

  chat.messages.push({ role:'user', content:text });
  if (chat.messages.length === 1) {
    chat.title = text.slice(0,40) + (text.length>40?'…':'');
    document.getElementById('topbar-title').textContent = chat.title;
  }
  save(); appendMsgEl('user', text, null, true); showTyping(); renderSidebar();

  try {
    const systemPrompt = {
      role: 'system',
      content: 'You are a helpful assistant. When writing code, ALWAYS write the COMPLETE, FULLY WORKING code — never truncate, never use placeholders like "// ... rest of code", "# TODO", "..." or similar shortcuts. Always finish what you start. If the code is long, still write it fully from start to finish.'
    };
    const msgs = [systemPrompt, ...chat.messages.map(m => ({ role: m.role==='ai'?'assistant':m.role, content:m.content }))];
    const resp = await fetch('https://text.pollinations.ai/openai', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ model:'openai', messages:msgs, max_tokens:4096, seed:Math.floor(Math.random()*99999) })
    });
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const data  = await resp.json();
    let reply = data.choices?.[0]?.message?.content || 'Нет ответа';
    let finishReason = data.choices?.[0]?.finish_reason;

    let attempts = 0;
    while (finishReason === 'length' && attempts < 4) {
      attempts++;
      const continueMessages = [
        systemPrompt,
        ...chat.messages.map(m => ({ role: m.role==='ai'?'assistant':m.role, content:m.content })),
        { role: 'assistant', content: reply },
        { role: 'user', content: 'Continue exactly where you left off, no explanation.' }
      ];
      const r2 = await fetch('https://text.pollinations.ai/openai', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ model:'openai', messages:continueMessages, max_tokens:4096, seed:Math.floor(Math.random()*99999) })
      });
      if (!r2.ok) break;
      const d2 = await r2.json();
      const part = d2.choices?.[0]?.message?.content || '';
      finishReason = d2.choices?.[0]?.finish_reason;
      reply += part;
    }
    removeTyping();
    chat.messages.push({ role:'ai', content:reply });
    save(); appendMsgEl('ai', reply, null, true);
  } catch(e) {
    removeTyping();
    const err = '⚠ Ошибка: ' + e.message;
    chat.messages.push({ role:'ai', content:err });
    save(); appendMsgEl('ai', err, null, true);
  }
  loading = false;
  document.getElementById('send-btn').disabled = false;
  input.focus();
}

async function generateImage() {
  const input = document.getElementById('user-input');
  const prompt = input.value.trim();
  if (!prompt || loading) return;
  const chat = getChat(); if (!chat) return;

  const size  = document.getElementById('img-size').value;
  const style = document.getElementById('img-style').value;
  const [w, h] = size.split('x');
  const fullPrompt = style ? prompt + ', ' + style : prompt;
  const encodedPrompt = encodeURIComponent(fullPrompt);
  const seed = Math.floor(Math.random() * 999999);
  const url  = `https://image.pollinations.ai/prompt/${encodedPrompt}?width=${w}&height=${h}&seed=${seed}&nologo=true`;

  loading = true;
  document.getElementById('send-btn').disabled = true;
  input.value = ''; input.style.height = 'auto';

  chat.messages.push({ role:'user', content:prompt });
  if (chat.messages.length === 1) {
    chat.title = '🖼 ' + prompt.slice(0,35) + (prompt.length>35?'…':'');
    document.getElementById('topbar-title').textContent = chat.title;
  }
  save(); appendMsgEl('user', prompt, null, true); showTyping(); renderSidebar();

  await new Promise(resolve => {
    const img = new Image();
    img.onload  = resolve;
    img.onerror = resolve;
    img.src = url;
    setTimeout(resolve, 15000);
  });

  removeTyping();
  chat.messages.push({ role:'ai', content:url, type:'image' });
  save(); appendMsgEl('ai', url, 'image', true);

  loading = false;
  document.getElementById('send-btn').disabled = false;
  input.focus();
}

function quickSend(text) {
  document.getElementById('user-input').value = text;
  sendMessage();
}

const inputEl = document.getElementById('user-input');
inputEl.addEventListener('keydown', e => { if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); } });
inputEl.addEventListener('input', () => { inputEl.style.height='auto'; inputEl.style.height=Math.min(inputEl.scrollHeight,120)+'px'; });
</script>
